<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>Kana Master - Universal Learning Engine v2.3</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iIzRmNDZlNSIvPgogIDx0ZXh0IHg9IjUwIiB5PSI2NyIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iNjAiIGZvbnQtd2VpZ2h0PSI5MDAiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7jgYI8L3RleHQ+Cjwvc3ZnPg==">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .transition-theme { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* --- Ruby 漢字讀音對齊修正 (標準 HTML5 方式) --- */
        ruby { 
            display: inline-table;
            vertical-align: bottom;
            ruby-align: center;
            padding: 0 1px;
        }
        ruby rt { 
            display: table-header-group;
            font-size: 0.45em; 
            color: #6366f1; 
            font-weight: 800; 
            text-align: center;
            line-height: 1.1;
            padding-bottom: 0.1em;
            letter-spacing: -0.02em;
        }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
    </style>
</head>
<body class="bg-slate-50 select-none overflow-x-hidden text-slate-800 font-sans transition-theme">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // --- Ruby 解析組件：優化分割邏輯 ---
        const RubyText = ({ text, className = "" }) => {
            if (!text) return null;
            const parts = text.split(/([^[\]\s、。！？]+\[[^\]]+\])/g);
            return (
                <span className={className}>
                    {parts.map((part, i) => {
                        const match = part.match(/^([^\[]+)\[([^\]]+)\]$/);
                        if (match) {
                            return <ruby key={i}>{match[1]}<rt>{match[2]}</rt></ruby>;
                        }
                        return <span key={i}>{part}</span>;
                    })}
                </span>
            );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, className]);
            return (
                <span key={name} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        function App() {
            // --- 狀態宣告 ---
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncMessage, setSyncMessage] = useState('');
            
            const [selectedUnits, setSelectedUnits] = useState(() => JSON.parse(localStorage.getItem('k_units_v68') || '[]'));
            const [practiceMode, setPracticeMode] = useState(() => localStorage.getItem('k_mode_v68') || 'order'); 
            const [autoSpeak, setAutoSpeak] = useState(() => JSON.parse(localStorage.getItem('k_autospeak_v68') ?? 'false'));
            const [speechRate, setSpeechRate] = useState(() => JSON.parse(localStorage.getItem('k_speechrate_v68') ?? "0.9"));
            const [showSource, setShowSource] = useState(() => JSON.parse(localStorage.getItem('k_source_v68') ?? 'true'));
            const [srsData, setSrsData] = useState(() => JSON.parse(localStorage.getItem('k_srs_v68') || '{}'));
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('k_gas_url_v68') || '');
            const [cloudCourses, setCloudCourses] = useState(() => JSON.parse(localStorage.getItem('k_cloud_courses_v68') || '{}'));
            const [activeCourseId, setActiveCourseId] = useState(() => localStorage.getItem('k_active_id_v68') || 'builtin_50');

            // --- 資料處理 ---
            const currentLessonItems = useMemo(() => {
                const rawItems = activeCourseId === 'builtin_50' ? [] : (cloudCourses[activeCourseId] || []);
                return rawItems.map(item => {
                    const normalized = { ...item };
                    Object.keys(item).forEach(key => {
                        const lowKey = key.toLowerCase().trim();
                        if (lowKey === 'unit') normalized.unit = item[key];
                        if (lowKey === 'secondary') normalized.secondary = item[key];
                        if (lowKey === 'secondaryreading') normalized.secondaryReading = item[key];
                        if (lowKey === 'primary') normalized.primary = item[key];
                        if (lowKey === 'reading') normalized.reading = item[key];
                        if (lowKey === 'meaning') normalized.meaning = item[key];
                    });
                    return normalized;
                });
            }, [activeCourseId, cloudCourses]);

            const availableUnits = useMemo(() => [...new Set(currentLessonItems.map(i => i.unit))].filter(Boolean), [currentLessonItems]);
            const currentCard = cards[currentIndex] || {};
            const cardId = (currentCard.primary || '') + (currentCard.reading || '');
            const activeCourseTitle = activeCourseId === 'builtin_50' ? '五十音' : activeCourseId;

            const theme = useMemo(() => {
                if (view === 'settings') return { bg: 'from-slate-100 to-gray-200', primary: 'slate' };
                if (practiceMode === 'anki') return { bg: 'from-purple-50 to-violet-100', primary: 'violet' };
                if (practiceMode === 'random') return { bg: 'from-orange-50 to-amber-100', primary: 'amber' };
                return { bg: 'from-blue-50 to-indigo-100', primary: 'indigo' };
            }, [view, practiceMode]);

            // --- 語音修復：解決漏掉第一個音的問題 ---
            const speak = useCallback((card) => {
                if (!window.speechSynthesis || !card || !card.reading) return;
                
                // 修正：在 speak 前確保引擎處於正確狀態
                window.speechSynthesis.cancel();
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                }

                // 加入小延遲確保 cancel 已完全清理緩衝
                setTimeout(() => {
                    const mainUtterance = new SpeechSynthesisUtterance(card.reading);
                    mainUtterance.lang = 'ja-JP';
                    mainUtterance.rate = parseFloat(speechRate);

                    if (card.secondaryReading) {
                        mainUtterance.onend = () => {
                            const secUtterance = new SpeechSynthesisUtterance(card.secondaryReading);
                            secUtterance.lang = 'ja-JP';
                            secUtterance.rate = parseFloat(speechRate);
                            setTimeout(() => window.speechSynthesis.speak(secUtterance), 350);
                        };
                    }
                    window.speechSynthesis.speak(mainUtterance);
                }, 50); 
            }, [speechRate]);

            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                const pool = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                if (pool.length === 0) { setCards([]); return; }
                
                let practiceCards = (targetMode === 'random') ? [...pool].sort(() => Math.random() - 0.5) : pool;
                setCards(practiceCards);
                setCurrentIndex(0); setIsFlipped(false); setView('practice');
            }, [selectedUnits, practiceMode, currentLessonItems]);

            // 持久化
            useEffect(() => {
                localStorage.setItem('k_units_v68', JSON.stringify(selectedUnits));
                localStorage.setItem('k_mode_v68', practiceMode);
                localStorage.setItem('k_autospeak_v68', JSON.stringify(autoSpeak));
                localStorage.setItem('k_speechrate_v68', JSON.stringify(speechRate));
                localStorage.setItem('k_source_v68', JSON.stringify(showSource));
                localStorage.setItem('k_srs_v68', JSON.stringify(srsData));
                localStorage.setItem('k_gas_url_v68', gasUrl);
                localStorage.setItem('k_cloud_courses_v68', JSON.stringify(cloudCourses));
                localStorage.setItem('k_active_id_v68', activeCourseId);
            }, [selectedUnits, practiceMode, autoSpeak, speechRate, showSource, srsData, gasUrl, cloudCourses, activeCourseId]);

            // 自動補全
            useEffect(() => {
                if (availableUnits.length > 0 && selectedUnits.length === 0) {
                    setSelectedUnits([availableUnits[0]]);
                }
            }, [availableUnits, selectedUnits]);

            // 切換卡片同步
            useEffect(() => {
                const pool = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                if (pool.length > 0) setCards(pool);
            }, [selectedUnits, currentLessonItems]);

            // 自動跟讀
            useEffect(() => {
                if (autoSpeak && cards.length > 0 && view === 'practice' && !isFlipped && currentCard.reading) {
                    const timer = setTimeout(() => speak(currentCard), 800);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, view, autoSpeak, isFlipped, currentCard.reading, speak]);

            const syncFromCloud = async () => {
                if (!gasUrl) return;
                setIsSyncing(true);
                try {
                    const response = await fetch(gasUrl);
                    const data = await response.json();
                    setCloudCourses(data);
                    const tabs = Object.keys(data);
                    if (tabs.length > 0) setActiveCourseId(tabs[0]);
                    setSyncMessage('同步成功！');
                    setTimeout(() => setSyncMessage(''), 3000);
                } catch (err) { setSyncMessage('同步失敗。'); }
                finally { setIsSyncing(false); }
            };

            const moveNext = () => { if (currentIndex === cards.length - 1) generatePracticeSet(); else { setIsFlipped(false); setTimeout(() => setCurrentIndex(p => p + 1), 150); } };
            const movePrev = () => { if (currentIndex > 0) { setIsFlipped(false); setTimeout(() => setCurrentIndex(p => p - 1), 150); } };

            return (
                <div className={`min-h-screen bg-gradient-to-br ${theme.bg} text-slate-800 font-sans pb-10 flex flex-col transition-theme`}>
                    <header className="bg-white/80 backdrop-blur-md border-b px-4 py-2 sticky top-0 z-30 flex justify-between items-center shadow-sm h-14 shrink-0">
                        <div className="flex flex-col">
                            <h1 className={`text-lg font-bold text-${theme.primary}-600 leading-none`}>Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-black tracking-widest mt-0.5 uppercase truncate max-w-[120px]">
                                {activeCourseTitle}
                            </span>
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="flex bg-slate-100 p-1 rounded-xl gap-0.5 mr-1 shadow-inner">
                                <button onClick={() => setPracticeMode('order')} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'order' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}><Icon name="list-ordered" size={18} /></button>
                                <button onClick={() => setPracticeMode('random')} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'random' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-400'}`}><Icon name="shuffle" size={18} /></button>
                            </div>
                            <button onClick={() => setAutoSpeak(!autoSpeak)} className={`p-2 rounded-xl active:scale-90 ${autoSpeak ? `bg-${theme.primary}-600 text-white shadow-md` : 'bg-slate-100 text-slate-400'}`}><Icon name={autoSpeak ? "volume-2" : "volume-x"} size={20} /></button>
                            <button onClick={() => setView('settings')} className={`p-2 rounded-xl transition-colors ${view === 'settings' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 flex-1 w-full overflow-y-auto no-scrollbar">
                        {view === 'practice' && (
                            <div className="space-y-4 h-full flex flex-col">
                                {cards.length > 0 ? (
                                    <>
                                        <div className="shrink-0">
                                            <div className="flex justify-between items-end mb-1 px-1"><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">{currentCard.unit}</div><div className="text-[10px] font-black text-slate-500">{currentIndex + 1} / {cards.length}</div></div>
                                            <div className="w-full bg-white/50 h-1.5 rounded-full overflow-hidden shadow-inner"><div className={`bg-${theme.primary}-500 h-full transition-all duration-300`} style={{ width: `${((currentIndex + 1) / Math.max(1, cards.length)) * 100}%` }}></div></div>
                                        </div>
                                        <div className={`relative h-[460px] w-full perspective-1000 cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden border border-white ${isFlipped ? 'hidden' : 'flex'}`}>
                                                <div className="h-1/4 flex items-center justify-center bg-indigo-50/20 relative shrink-0">
                                                    <span className="text-8xl animate-bounce-slow drop-shadow-sm">{currentCard.emoji}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className={`absolute top-4 right-4 bg-${theme.primary}-600 text-white p-3 rounded-full shadow-lg active:scale-90`}><Icon name="volume-2" size={20}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-6 text-center overflow-hidden">
                                                    <RubyText text={currentCard.primary} className={`${(currentCard.primary || '').length > 6 ? 'text-5xl' : 'text-8xl'} font-black text-slate-800 leading-none mb-8`} />
                                                    {currentCard.secondary && (
                                                        <div className="bg-slate-50/80 px-6 py-4 rounded-3xl border border-slate-100 max-w-full">
                                                            <RubyText text={currentCard.secondary} className="text-indigo-400 font-bold text-xl italic" />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-white transition-opacity ${isFlipped ? 'flex' : 'hidden'}`}>
                                                <div className="h-20 flex items-center justify-between px-8 bg-slate-50 border-b border-slate-100 shrink-0">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-3xl">{currentCard.emoji}</span>
                                                        <RubyText text={currentCard.primary} className="text-xl font-black text-slate-400" />
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="text-indigo-600 p-2 active:scale-90"><Icon name="volume-2" size={24}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-6 overflow-y-auto no-scrollbar">
                                                    <div className="space-y-1">
                                                        <h3 className="text-4xl font-black text-indigo-600 tracking-tight leading-tight">{currentCard.meaning}</h3>
                                                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">翻譯</p>
                                                    </div>
                                                    {currentCard.secondary && (
                                                        <div className="bg-indigo-50/30 p-5 rounded-3xl border border-indigo-100/30 w-full">
                                                            <RubyText text={currentCard.secondary} className="text-slate-600 font-bold text-2xl" />
                                                        </div>
                                                    )}
                                                    <div className="bg-rose-50 p-2 rounded-xl border border-rose-100 mt-2 opacity-60">
                                                        <p className="text-[8px] font-black text-rose-400 leading-tight">DEBUG VOICE STREAM:</p>
                                                        <p className="text-xs font-mono text-rose-600 break-words">{currentCard.secondaryReading || "(empty)"}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-2">
                                            <button onClick={movePrev} disabled={currentIndex === 0} className="bg-white border-2 border-slate-200 py-4 rounded-3xl font-black text-xs text-slate-500 disabled:opacity-30 active:bg-slate-50 flex items-center justify-center transition-all">上一張</button>
                                            <button onClick={moveNext} className={`bg-${theme.primary}-600 text-white py-4 rounded-3xl font-black shadow-xl active:scale-95 flex items-center justify-center transition-all`}>下一張</button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-10"><Icon name="cloud-off" size={48} className="text-slate-300 mb-4" /><p className="text-slate-400 font-bold">請先至設定同步教材</p></div>
                                )}
                            </div>
                        )}
                        {view === 'settings' && (
                            <div className="space-y-6 pb-40 animate-in slide-in-from-bottom-4 duration-500">
                                <section className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-4">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">雲端同步</h2>
                                    <input type="text" placeholder="GAS URL" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" />
                                    <button onClick={syncFromCloud} disabled={isSyncing || !gasUrl} className="w-full py-4 rounded-xl bg-indigo-600 text-white font-bold shadow-md">同步教材</button>
                                    <select value={activeCourseId} onChange={(e) => setActiveCourseId(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold">
                                        <option value="builtin_50">選擇課程分頁</option>
                                        {Object.keys(cloudCourses).map(name => <option key={name} value={name}>{name}</option>)}
                                    </select>
                                </section>
                                <section className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-4">
                                    <h2 className="text-base font-black text-slate-700 uppercase">單元選擇 (Unit)</h2>
                                    <div className="grid grid-cols-2 gap-2">
                                        {availableUnits.map(unit => (
                                            <button key={unit} onClick={() => setSelectedUnits(prev => prev.includes(unit) ? prev.filter(u => u !== unit) : [...prev, unit])} className={`py-3 px-2 rounded-xl text-xs font-black border transition-all ${selectedUnits.includes(unit) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>{unit}</button>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 z-30 pointer-events-none transition-theme"><button onClick={() => setView('practice')} className={`pointer-events-auto bg-slate-900 text-white px-10 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 active:scale-95 transition-all`}><Icon name="arrow-left" size={18} /> <span className="text-sm font-black uppercase tracking-widest">返回</span></button></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
