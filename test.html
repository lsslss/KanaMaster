<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>Kana Master - Universal Learning Engine</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iIzRmNDZlNSIvPgogIDx0ZXh0IHg9IjUwIiB5PSI2NyIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iNjAiIGZvbnQtd2VpZ2h0PSI5MDAiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7jgYI8L3RleHQ+Cjwvc3ZnPg==">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .transition-theme { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        ruby rt { font-size: 0.45em; color: #6366f1; font-weight: bold; padding-bottom: 0.1em; }
        .card-shadow { box-shadow: 0 20px 50px -12px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="bg-slate-50 select-none overflow-x-hidden text-slate-800 font-sans transition-theme">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // --- 1. 預設資料 (v2.0 規格) ---
        const DEFAULT_KANA_DATA = [
            { unit: 'あ行', category: 'kana', primary: 'あ', reading: 'あ', meaning: '平假名 a', secondary: '空[あ]き', notes: '字源：安', emoji: '🈳' },
            { unit: 'あ行', category: 'kana', primary: 'い', reading: 'い', meaning: '平假名 i', secondary: '入口[いりぐち]', notes: '字源：以', emoji: '🚪' },
            { unit: 'あ行', category: 'kana', primary: 'う', reading: 'う', meaning: '平假名 u', secondary: '受付[うけつけ]', notes: '字源：宇', emoji: '💁' },
            { unit: 'あ行', category: 'kana', primary: 'え', reading: 'え', meaning: '平假名 e', secondary: '駅[えき]', notes: '字源：衣', emoji: '🚉' },
            { unit: 'あ行', category: 'kana', primary: 'お', reading: 'お', meaning: '平假名 o', secondary: '土産[みやげ]', notes: '字源：於', emoji: '🎁' },
            { unit: 'か行', category: 'kana', primary: 'か', reading: 'か', meaning: '平假名 ka', secondary: '観光[かんこう]', notes: '字源：加', emoji: '🏯' },
            { unit: 'か行', category: 'kana', primary: 'き', reading: 'き', meaning: '平假名 ki', secondary: '切符[きっぷ]', notes: '字源：幾', emoji: '🎫' },
            { unit: 'か行', category: 'kana', primary: 'く', reading: 'く', meaning: '平假名 ku', secondary: '空港[くうこう]', notes: '字源：久', emoji: '✈️' },
            { unit: 'か行', category: 'kana', primary: 'け', reading: 'け', meaning: '平假名 ke', secondary: '携帯[けいたい]', notes: '字源：計', emoji: '📱' },
            { unit: 'か行', category: 'kana', primary: 'こ', reading: 'こ', meaning: '平假名 ko', secondary: '交番[こうばん]', notes: '字源：己', emoji: '🚔' }
        ];

        const BUILTIN_GROUPS = {
            'hira': {
                '基本音': ['あ行', 'か行', 'さ行', 'た行', 'な行', 'は行', 'ま行', 'や行', 'ら行', 'わ行', '鼻音'],
                '濁音/半濁音': ['が行', 'ざ行', 'だ行', 'ば行', 'ぱ行'],
                '拗音': ['きゃ行', 'しゃ行', 'ちゃ行', 'にゃ行', 'ひゃ行', 'みゃ行', 'りゃ行', 'ぎゃ行', 'じゃ行', 'びゃ行', 'ぴゃ行']
            },
            'kata': {
                '基本音': ['ア行', 'カ行', 'サ行', 'タ行', 'ナ行', 'ハ行', 'マ行', 'ヤ行', 'ラ行', 'ワ行', '鼻音'],
                '濁音/半濁音': ['ガ行', 'ザ行', 'ダ行', 'バ行', 'パ行'],
                '拗音': ['キャ行', 'シャ行', 'チャ行']
            }
        };

        // --- Ruby 解析組件 ---
        const RubyText = ({ text, className = "" }) => {
            if (!text) return null;
            const parts = text.split(/([^\s\[\]]+\[[^\]]+\])/g);
            return (
                <span className={className}>
                    {parts.map((part, i) => {
                        const match = part.match(/^([^\[]+)\[([^\]]+)\]$/);
                        if (match) return <ruby key={i}>{match[1]}<rt>{match[2]}</rt></ruby>;
                        return part;
                    })}
                </span>
            );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, className]);
            return (
                <span key={name} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        function App() {
            // --- 1. 狀態宣告 ---
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showSRSComplete, setShowSRSComplete] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncMessage, setSyncMessage] = useState('');
            
            const [selectedUnits, setSelectedUnits] = useState(() => JSON.parse(localStorage.getItem('k_units_v55') || '[]'));
            const [selectedTypes, setSelectedTypes] = useState(() => JSON.parse(localStorage.getItem('k_types_v55') || '["hira"]'));
            const [practiceMode, setPracticeMode] = useState(() => localStorage.getItem('k_mode_v55') || 'order'); 
            const [autoSpeak, setAutoSpeak] = useState(() => JSON.parse(localStorage.getItem('k_autospeak_v55') ?? 'false'));
            const [speechRate, setSpeechRate] = useState(() => JSON.parse(localStorage.getItem('k_speechrate_v55') ?? '0.9'));
            const [showSource, setShowSource] = useState(() => JSON.parse(localStorage.getItem('k_source_v55') ?? 'true'));
            const [srsData, setSrsData] = useState(() => JSON.parse(localStorage.getItem('k_srs_v55') || '{}'));
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('k_gas_url_v55') || '');
            const [cloudCourses, setCloudCourses] = useState(() => JSON.parse(localStorage.getItem('k_cloud_courses_v55') || '{}'));
            const [activeCourseId, setActiveCourseId] = useState(() => localStorage.getItem('k_active_id_v55') || 'builtin_50');

            // --- 2. 衍生狀態 ---
            const currentLessonItems = useMemo(() => {
                if (activeCourseId === 'builtin_50') return DEFAULT_KANA_DATA;
                return cloudCourses[activeCourseId] || [];
            }, [activeCourseId, cloudCourses]);

            const availableUnits = useMemo(() => {
                const units = [...new Set(currentLessonItems.map(i => i.unit))].filter(Boolean);
                return units;
            }, [currentLessonItems]);

            const activeCourseTitle = activeCourseId === 'builtin_50' ? '五十音基礎' : activeCourseId;
            const currentCard = cards[currentIndex] || {};
            const cardId = (currentCard.primary || '') + (currentCard.reading || '');
            const srsInfo = srsData[cardId] || { step: 0, interval: 0 };
            const isWeak = srsInfo.step < 2 && srsInfo.step > 0;

            const dueCount = useMemo(() => {
                const now = Date.now();
                return currentLessonItems.filter(item => {
                    if (!selectedUnits.includes(item.unit)) return false;
                    const id = (item.primary || '') + (item.reading || '');
                    return srsData[id] && srsData[id].nextReview <= now;
                }).length;
            }, [srsData, selectedUnits, currentLessonItems]);

            const stats = useMemo(() => {
                const items = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                const learned = items.filter(i => (srsData[(i.primary || '') + (i.reading || '')]?.step || 0) >= 4).length;
                const learning = items.filter(i => {
                    const s = srsData[(i.primary || '') + (i.reading || '')]?.step || 0;
                    return s > 0 && s < 4;
                }).length;
                return { total: items.length, learned, learning };
            }, [srsData, selectedUnits, currentLessonItems]);

            const theme = useMemo(() => {
                if (view === 'settings') return { bg: 'from-slate-100 to-gray-200', primary: 'slate' };
                if (practiceMode === 'anki') return { bg: 'from-purple-50 to-violet-100', primary: 'violet' };
                if (practiceMode === 'random') return { bg: 'from-orange-50 to-amber-100', primary: 'amber' };
                return { bg: 'from-blue-50 to-indigo-100', primary: 'indigo' };
            }, [view, practiceMode]);

            // --- 3. 語音與同步函式 ---
            const speak = useCallback((card) => {
                if (!window.speechSynthesis || !card || !card.reading) return;
                window.speechSynthesis.cancel();
                
                // 讀取主文字
                const mainUtterance = new SpeechSynthesisUtterance(card.reading);
                mainUtterance.lang = 'ja-JP';
                mainUtterance.rate = speechRate;

                // 解析並讀取輔助文字 (secondary) 中的讀音
                let secondaryReading = '';
                if (card.secondary) {
                    const matches = card.secondary.match(/\[([^\]]+)\]/g);
                    if (matches) secondaryReading = matches.map(m => m.slice(1, -1)).join(' ');
                    else secondaryReading = card.secondary;
                }

                if (secondaryReading) {
                    mainUtterance.onend = () => {
                        const secUtterance = new SpeechSynthesisUtterance(secondaryReading);
                        secUtterance.lang = 'ja-JP';
                        secUtterance.rate = speechRate;
                        setTimeout(() => window.speechSynthesis.speak(secUtterance), 350);
                    };
                }
                window.speechSynthesis.speak(mainUtterance);
            }, [speechRate]);

            const syncFromCloud = async () => {
                if (!gasUrl) return;
                setIsSyncing(true);
                setSyncMessage('同步中...');
                try {
                    const response = await fetch(gasUrl);
                    const data = await response.json();
                    setCloudCourses(data);
                    const tabs = Object.keys(data);
                    if (tabs.length > 0) setActiveCourseId(tabs[0]);
                    setSyncMessage('同步成功！');
                    setTimeout(() => setSyncMessage(''), 3000);
                } catch (err) { setSyncMessage('同步失敗，請檢查 URL。'); }
                finally { setIsSyncing(false); }
            };

            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                const pool = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                let practiceCards = [];
                setShowSRSComplete(false);
                
                if (targetMode === 'anki') {
                    const now = Date.now();
                    practiceCards = pool.filter(i => {
                        const id = (i.primary || '') + (i.reading || '');
                        return !srsData[id] || srsData[id].nextReview <= now; 
                    }).sort(() => Math.random() - 0.5);
                    if (practiceCards.length === 0) { setShowSRSComplete(true); setCards([]); return; }
                } else if (targetMode === 'random') {
                    practiceCards = [...pool].sort(() => Math.random() - 0.5);
                } else {
                    practiceCards = pool;
                }
                
                setCards(practiceCards.length > 0 ? practiceCards : (currentLessonItems.length > 0 ? [currentLessonItems[0]] : []));
                setCurrentIndex(0); setIsFlipped(false); setView('practice');
            }, [selectedUnits, srsData, practiceMode, currentLessonItems]);

            // --- 4. 副作用 ---
            useEffect(() => {
                localStorage.setItem('k_units_v55', JSON.stringify(selectedUnits));
                localStorage.setItem('k_types_v55', JSON.stringify(selectedTypes));
                localStorage.setItem('k_mode_v55', practiceMode);
                localStorage.setItem('k_autospeak_v55', JSON.stringify(autoSpeak));
                localStorage.setItem('k_speechrate_v55', JSON.stringify(speechRate));
                localStorage.setItem('k_source_v55', JSON.stringify(showSource));
                localStorage.setItem('k_srs_v55', JSON.stringify(srsData));
                localStorage.setItem('k_gas_url_v55', gasUrl);
                localStorage.setItem('k_cloud_courses_v55', JSON.stringify(cloudCourses));
                localStorage.setItem('k_active_id_v55', activeCourseId);
            }, [selectedUnits, selectedTypes, practiceMode, autoSpeak, speechRate, showSource, srsData, gasUrl, cloudCourses, activeCourseId]);

            // [關鍵]：切換課程或單元列表變動時，自動選取第一個有效單元
            useEffect(() => {
                if (availableUnits.length > 0) {
                    const valid = selectedUnits.filter(u => availableUnits.includes(u));
                    if (valid.length === 0) setSelectedUnits([availableUnits[0]]);
                }
            }, [activeCourseId, cloudCourses, availableUnits]);

            // 自動更新卡片池
            useEffect(() => {
                const pool = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                if (pool.length > 0) {
                    setCards(pool);
                    setCurrentIndex(0);
                    setIsFlipped(false);
                }
            }, [selectedUnits, currentLessonItems]);

            // 自動跟讀
            useEffect(() => {
                if (autoSpeak && cards.length > 0 && view === 'practice' && !isFlipped && currentCard.reading) {
                    const timer = setTimeout(() => speak(currentCard), 700);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, view, autoSpeak, isFlipped, currentCard.reading, speak]);

            const moveNext = () => { if (currentIndex === cards.length - 1) generatePracticeSet(); else { setIsFlipped(false); setTimeout(() => setCurrentIndex(p => p + 1), 150); } };
            const movePrev = () => { if (currentIndex > 0) { setIsFlipped(false); setTimeout(() => setCurrentIndex(p => p - 1), 150); } };

            return (
                <div className={`min-h-screen bg-gradient-to-br ${theme.bg} text-slate-800 font-sans pb-10 flex flex-col transition-theme`}>
                    <header className="bg-white/80 backdrop-blur-md border-b px-4 py-2 sticky top-0 z-30 flex justify-between items-center shadow-sm h-14 shrink-0">
                        <div className="flex flex-col">
                            <h1 className={`text-lg font-bold text-${theme.primary}-600 leading-none`}>Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-black tracking-widest mt-0.5 uppercase truncate max-w-[120px]">
                                {practiceMode === 'anki' ? `Review: ${dueCount}` : 'Practice'}
                            </span>
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="flex bg-slate-100 p-1 rounded-xl gap-0.5 mr-1 shadow-inner">
                                <button onClick={() => { setPracticeMode('order'); generatePracticeSet('order'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'order' && view !== 'settings' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}><Icon name="list-ordered" size={18} /></button>
                                <button onClick={() => { setPracticeMode('random'); generatePracticeSet('random'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'random' && view !== 'settings' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-400'}`}><Icon name="shuffle" size={18} /></button>
                                <button onClick={() => { setPracticeMode('anki'); generatePracticeSet('anki'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'anki' && view !== 'settings' ? 'bg-white shadow-sm text-violet-600' : 'text-slate-400'}`}><Icon name="brain" size={18} /></button>
                            </div>
                            <button onClick={() => setAutoSpeak(!autoSpeak)} className={`p-2 rounded-xl active:scale-90 ${autoSpeak ? `bg-${theme.primary}-600 text-white shadow-md` : 'bg-slate-100 text-slate-400'}`}><Icon name={autoSpeak ? "volume-2" : "volume-x"} size={20} /></button>
                            <button onClick={() => setView('settings')} className={`p-2 rounded-xl ${view === 'settings' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 flex-1 w-full overflow-y-auto no-scrollbar">
                        {view === 'practice' && (
                            <div className="space-y-4 h-full flex flex-col">
                                {showSRSComplete ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-6 animate-in zoom-in-95 duration-500">
                                        <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-xl text-violet-500"><Icon name="party-popper" size={48} /></div>
                                        <h2 className="text-2xl font-black text-slate-800 mb-2">任務達成！</h2>
                                        <p className="text-slate-500 mb-8 leading-relaxed text-sm italic">目前沒有到期字卡。</p>
                                        <button onClick={() => { setPracticeMode('order'); generatePracticeSet('order'); }} className="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-white shadow-lg">循序練習</button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="shrink-0">
                                            <div className="flex justify-between items-end mb-1 px-1"><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">{activeCourseTitle}</div><div className="text-[10px] font-black text-slate-500">{currentIndex + 1} / {cards.length}</div></div>
                                            <div className="w-full bg-white/50 h-1.5 rounded-full overflow-hidden shadow-inner"><div className={`bg-${theme.primary}-500 h-full transition-all duration-300`} style={{ width: `${((currentIndex + 1) / Math.max(1, cards.length)) * 100}%` }}></div></div>
                                        </div>
                                        <div className={`relative h-[460px] w-full perspective-1000 cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                            {/* 正面 */}
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden border border-white ${isFlipped ? 'hidden' : 'flex'}`}>
                                                <div className="h-1/4 flex items-center justify-center bg-indigo-50/20 relative shrink-0">
                                                    <span className="text-8xl animate-bounce-slow drop-shadow-sm">{currentCard.emoji}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className={`absolute top-4 right-4 bg-${theme.primary}-600 text-white p-3 rounded-full shadow-lg active:scale-90 transition-all`}><Icon name="volume-2" size={20}/></button>
                                                    {isWeak && <div className="absolute top-4 left-4 text-rose-500 animate-pulse"><Icon name="zap" size={20} /></div>}
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                                                    <RubyText text={currentCard.primary} className={`${currentCard.category === 'sentence' ? 'text-4xl' : 'text-8xl'} font-black text-slate-800 leading-tight mb-6 transition-all`} />
                                                    {currentCard.secondary && (
                                                        <div className="bg-slate-50/80 px-6 py-3 rounded-2xl border border-slate-100">
                                                            <RubyText text={currentCard.secondary} className="text-indigo-400 font-bold text-lg italic" />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            {/* 背面 */}
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-white transition-opacity ${isFlipped ? 'flex' : 'hidden'}`}>
                                                <div className="h-20 flex items-center justify-between px-8 bg-slate-50 border-b border-slate-100 shrink-0">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-3xl">{currentCard.emoji}</span>
                                                        <RubyText text={currentCard.primary} className="text-xl font-black text-slate-400" />
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="text-indigo-600 p-2 active:scale-90"><Icon name="volume-2" size={24}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-6 overflow-y-auto no-scrollbar">
                                                    <div className="space-y-1">
                                                        <h3 className="text-4xl font-black text-indigo-600 tracking-tight leading-tight">{currentCard.meaning}</h3>
                                                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">翻譯</p>
                                                    </div>
                                                    {currentCard.secondary && (
                                                        <div className="bg-indigo-50/30 p-5 rounded-3xl border border-indigo-100/30 w-full">
                                                            <RubyText text={currentCard.secondary} className="text-slate-600 font-bold text-xl" />
                                                        </div>
                                                    )}
                                                    {currentCard.notes && (
                                                        <div className="space-y-1">
                                                            <p className="text-sm text-slate-400 font-medium px-4">{currentCard.notes}</p>
                                                            <p className="text-[9px] font-bold text-slate-300 uppercase tracking-tighter">註解</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="pt-2 shrink-0 h-16">
                                            {practiceMode === 'anki' ? (
                                                <div className="grid grid-cols-4 gap-2">
                                                    {[ { q: 1, l: 'Again', c: 'bg-rose-50 text-rose-600' }, { q: 2, l: 'Hard', c: 'bg-orange-50 text-orange-600' }, { q: 3, l: 'Good', c: 'bg-emerald-50 text-emerald-600' }, { q: 4, l: 'Easy', c: 'bg-blue-50 text-blue-600' } ].map(btn => (
                                                        <button key={btn.q} onClick={() => handleReview(btn.q)} className={`${btn.c} border-2 border-current border-opacity-10 py-4 rounded-2xl font-black text-xs uppercase active:scale-95 transition-all`}>{btn.l}</button>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-2 gap-4">
                                                    <button onClick={movePrev} disabled={currentIndex === 0} className="bg-white border-2 border-slate-200 py-4 rounded-3xl font-black text-xs text-slate-500 disabled:opacity-30 active:bg-slate-50 flex items-center justify-center transition-all uppercase tracking-widest">上一張</button>
                                                    <button onClick={moveNext} className={`bg-${theme.primary}-600 text-white py-4 rounded-3xl font-black shadow-xl active:scale-95 flex items-center justify-center transition-all uppercase tracking-widest`}>下一張</button>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                        {view === 'settings' && (
                            <div className="space-y-6 pb-40 animate-in slide-in-from-bottom-4 duration-500">
                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">雲端同步與課程管理</h2>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-black text-slate-400 ml-1">GAS URL</span>
                                            <input type="text" placeholder="貼上部署後的 URL" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500" />
                                        </div>
                                        <button onClick={syncFromCloud} disabled={isSyncing || !gasUrl} className={`w-full py-4 rounded-xl text-xs font-black flex items-center justify-center gap-3 transition-all ${isSyncing ? 'bg-slate-100 text-slate-400' : 'bg-indigo-600 text-white shadow-md active:scale-95'}`}>
                                            <Icon name={isSyncing ? "loader" : "refresh-cw"} size={16} className={isSyncing ? "animate-spin" : ""} />立刻同步雲端教材
                                        </button>
                                        {syncMessage && <p className="text-[10px] font-bold text-indigo-500 text-center">{syncMessage}</p>}
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-black text-slate-400 ml-1">切換目前課程</span>
                                            <select value={activeCourseId} onChange={(e) => { setActiveCourseId(e.target.value); setSelectedUnits([]); }} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none">
                                                <option value="builtin_50">五十音基礎 (內建)</option>
                                                {Object.keys(cloudCourses).map(name => <option key={name} value={name}>{name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </section>

                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">練習範圍設定</h2>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-4">
                                        {activeCourseId === 'builtin_50' ? (
                                            <div className="space-y-6">
                                                <div className="grid grid-cols-2 gap-3">
                                                    {['hira', 'kata'].map(t => (
                                                        <button key={t} onClick={() => setSelectedTypes(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t])} className={`py-5 rounded-3xl border-2 transition-all ${selectedTypes.includes(t) ? 'border-indigo-600 bg-indigo-600 text-white shadow-xl' : 'border-slate-100 bg-white text-slate-300'}`}>
                                                            <span className="text-2xl font-black block">{t === 'hira' ? 'あ' : 'ア'}</span><span className="text-[10px] font-black uppercase">{t === 'hira' ? '平假名' : '片假名'}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                                {selectedTypes.map(type => (
                                                    <div key={type} className="space-y-4">
                                                        <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest px-1 border-b border-indigo-50 pb-2">{type === 'hira' ? '平假名' : '片假名'} 列表</p>
                                                        {Object.entries(BUILTIN_GROUPS[type]).map(([subLabel, rows]) => (
                                                            <div key={subLabel} className="space-y-2">
                                                                <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">{subLabel}</span>
                                                                <div className="grid grid-cols-4 gap-2">
                                                                    {rows.map(row => (
                                                                        <button key={row} onClick={() => setSelectedUnits(prev => prev.includes(row) ? prev.filter(r => r !== row) : [...prev, row])} className={`py-3 rounded-2xl text-[11px] font-black border transition-all ${selectedUnits.includes(row) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white border-slate-100 text-slate-400'}`}>{row.replace('行', '')}</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <>
                                                <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">單元選擇 (Unit)</span>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {availableUnits.map(unit => (
                                                        <button key={unit} onClick={() => setSelectedUnits(prev => prev.includes(unit) ? prev.filter(u => u !== unit) : [...prev, unit])} className={`py-3 px-2 rounded-xl text-xs font-black transition-all border truncate ${selectedUnits.includes(unit) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>{unit}</button>
                                                    ))}
                                                </div>
                                                {availableUnits.length === 0 && <p className="text-xs text-rose-500 text-center py-4">此分頁未包含單元欄位，請檢查試算表標題。</p>}
                                            </>
                                        )}
                                    </div>
                                </section>

                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">系統與數據</h2>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-5">
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-center px-1"><span className="text-sm font-black text-slate-600">發音速度: {speechRate}x</span><Icon name="mic-2" size={16} className="text-indigo-400" /></div>
                                            <input type="range" min="0.5" max="1.5" step="0.1" value={speechRate} onChange={(e) => setSpeechRate(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                        </div>
                                        <label className="flex items-center justify-between cursor-pointer"><div className="flex flex-col"><span className="font-black text-slate-700 text-sm">顯示註解與起源</span><span className="text-[9px] text-slate-400 font-bold uppercase">輔助記憶資訊</span></div><input type="checkbox" checked={showSource} onChange={(e) => setShowSource(e.target.checked)} className="w-6 h-6 rounded-md accent-indigo-600" /></label>
                                        <div className="grid grid-cols-2 gap-2 pt-2">
                                            <button onClick={() => { const blob = new Blob([JSON.stringify(srsData)], {type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='progress.json'; a.click(); }} className="flex items-center justify-center gap-2 py-3 bg-slate-50 rounded-xl text-[10px] font-black border border-slate-100 shadow-sm"><Icon name="download" size={12} /> 備份進度</button>
                                            <button onClick={() => { if(confirm('確定要重置數據嗎？')) { setSrsData({}); alert('已清除'); } }} className="flex items-center justify-center gap-2 py-3 bg-rose-50 text-rose-600 rounded-xl text-[10px] font-black border border-rose-100 shadow-sm"><Icon name="rotate-ccw" size={12} /> 重置數據</button>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 z-30 pointer-events-none transition-theme"><button onClick={() => { if (view === 'settings') generatePracticeSet(); else setView('practice'); }} className={`pointer-events-auto bg-slate-900 text-white px-10 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 active:scale-95 transition-all animate-in slide-in-from-bottom-6`}><Icon name={view === 'settings' ? "check-circle" : "arrow-left"} size={18} /> <span className="text-sm font-black uppercase tracking-widest">{view === 'settings' ? "套用設定並開始" : "返回"}</span></button></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
