<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>Kana Master v5.6 - Layout Fix</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        (function() {
            const absoluteUrl = window.location.origin + window.location.pathname;
            const manifest = {
                "name": "Kana Master",
                "short_name": "KanaMaster",
                "id": absoluteUrl, 
                "start_url": absoluteUrl,
                "display": "standalone",
                "background_color": "#ffffff",
                "theme_color": "#4f46e5",
                "icons": [{
                    "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgNTEyIDUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSI4MCIgZmlsbD0iIzRmNDZlNSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkeT0iLjM1ZW0iIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjMwMCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtd2VpZ2h0PSJib2xkIj7jgYI8L3RleHQ+PC9zdmc+",
                    "sizes": "512x512",
                    "type": "image/svg+xml",
                    "purpose": "any"
                }]
            };

            const stringManifest = JSON.stringify(manifest);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestURL;
            document.head.appendChild(link);

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js').then(reg => {
                        console.log('PWA SW Registered');
                    }).catch(err => {
                        console.warn('PWA SW Registration Failed:', err);
                    });
                });
            }
        })();
    </script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        ruby { 
            display: inline-flex; 
            flex-direction: column-reverse; 
            align-items: center; 
            vertical-align: bottom; 
            margin: 0 1px; 
            line-height: 1.25;
        }
        ruby rt { 
            display: block; 
            font-size: 0.45em; 
            color: #6366f1; 
            font-weight: 800; 
            text-align: center; 
            padding-bottom: 0.1em; 
            width: 100%; 
            line-height: 1; 
            transition: all 0.3s ease; 
        }
        
        .large-font-mode ruby { line-height: 1.45; }
        .large-font-mode ruby rt { font-size: 0.65em; padding-bottom: 0.05em; }

        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.1), 0 5px 15px -5px rgba(0, 0, 0, 0.04); }
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { background-color: #f8fafc; }
        @media (min-width: 768px) { body { background-color: #e2e8f0; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; } }
    </style>
</head>
<body class="select-none overflow-hidden text-slate-800 font-sans h-screen">
    <div id="root" class="h-full flex justify-center items-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        const APP_VERSION = "v5.6";

        // --- 使用手冊內容 ---
        const MANUAL_LESSON = [
            { unit: "教學", category: "sentence", primary: "點[てん]選[せん]卡[か]片[へん]", reading: "てんせんかへん", meaning: "點擊卡片可翻面查看意義", secondary: "翻[はん]面[めん]測[そく]試[し]", secondaryreading: "はんめんそくし", emoji: "👇", notes: "這是最基礎的操作。" },
            { unit: "教學", category: "sentence", primary: "聆[れい]聽[ちょう]發[はつ]音[おん]", reading: "れいちょうはつおん", meaning: "點選喇叭圖示聽高品質發音", secondary: "聽[ちょう]解[かい]練[れん]習[しゅう]", secondaryreading: "ちょうかいれんしゅう", emoji: "🔊", notes: "建議在設定中啟用神經發音。" },
            { unit: "教學", category: "sentence", primary: "同[どう]步[ほ]課[か]程[てい]", reading: "どうほかてい", meaning: "前往設定貼上 GAS URL 同步雲端內容", secondary: "雲[うん]端[たん]同[どう]步[ほ]機[き]制[せい]", secondaryreading: "過長內容測試測試測試測試", emoji: "☁️", notes: "第一次使用請先完成同步。" },
            { unit: "教學", category: "sentence", primary: "佈[ふ]局[きょく]修[しゅう]正[せい]", reading: "ふきょくしゅうせい", meaning: "優化手機垂直空間，防止按鈕溢出", secondary: "v5.6 バージョン", secondaryreading: "バージョンごてんろく", emoji: "📱", notes: "解決了 Pixel 9 等手機的顯示問題。" }
        ];

        // --- IndexedDB ---
        const DB_NAME = "KM_Audio_v40";
        const STORE_NAME = "local_audio";
        const initDB = () => new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME); };
            request.onsuccess = (e) => resolve(e.target.result);
        });
        const deleteStore = async () => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).clear();
            return new Promise(r => tx.oncomplete = r);
        };
        const getLocal = async (key) => {
            const db = await initDB();
            return new Promise((r) => { const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(key); req.onsuccess = () => r(req.result); req.onerror = () => r(null); });
        };
        const saveLocal = async (key, val) => {
            const db = await initDB();
            db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).put(val, key);
        };
        const countLocalItems = async () => {
            const db = await initDB();
            return new Promise(r => { const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).count(); req.onsuccess = () => r(req.result); });
        };

        const pcmToWav = (base64) => {
            try {
                const bytes = atob(base64);
                const buffer = new ArrayBuffer(bytes.length + 44);
                const view = new DataView(buffer);
                const writeString = (off, str) => { for(let i=0; i<str.length; i++) view.setUint8(off+i, str.charCodeAt(i)); };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + bytes.length, true);
                writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, 24000, true);
                view.setUint32(28, 48000, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeString(36, 'data'); view.setUint32(40, bytes.length, true);
                for(let i=0; i<bytes.length; i++) view.setUint8(44+i, bytes.charCodeAt(i));
                return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
            } catch(e) { return null; }
        };

        const RubyText = ({ text, className = "" }) => {
            if (!text) return null;
            const parts = text.split(/([^[\]\s、。！？]+\[[^\]]+\])/g);
            return <span className={className}>{parts.map((p, i) => {
                const m = p.match(/^([^\[]+)\[([^\]]+)\]$/);
                return m ? <ruby key={i}>{m[1]}<rt>{m[2]}</rt></ruby> : <span key={i}>{p}</span>;
            })}</span>;
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, className]);
            return <span key={name} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}><i data-lucide={name} style={{ width: size, height: size }}></i></span>;
        };

        function App() {
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [ttsStatus, setTtsStatus] = useState('Standby');
            const [localCacheCount, setLocalCacheCount] = useState(0);
            const [downloadProgress, setDownloadProgress] = useState(null);
            
            const [openSections, setOpenSections] = useState({ pref: false, sync: false, voice: false });
            const toggleSection = (key) => setOpenSections(prev => ({ ...prev, [key]: !prev[key] }));
            
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('km_gas_v43') || '');
            const [useNeural, setUseNeural] = useState(() => JSON.parse(localStorage.getItem('km_use_n_v43') ?? 'true'));
            const [isLargeFont, setIsLargeFont] = useState(() => JSON.parse(localStorage.getItem('km_large_font_v53') ?? 'false'));
            const [selectedUnits, setSelectedUnits] = useState(() => JSON.parse(localStorage.getItem('km_u_v43') || '[]'));
            const [practiceMode, setPracticeMode] = useState(() => localStorage.getItem('km_mode_v43') || 'order');
            const [autoSpeak, setAutoSpeak] = useState(() => JSON.parse(localStorage.getItem('km_autospeak_v43') ?? 'false'));
            const [speechRate, setSpeechRate] = useState(() => JSON.parse(localStorage.getItem('km_speechrate_v43') ?? "1.0"));
            const [cloudCourses, setCloudCourses] = useState(() => JSON.parse(localStorage.getItem('km_c_v43') || '{}'));
            const [activeCourseId, setActiveCourseId] = useState(() => localStorage.getItem('km_a_v43') || 'builtin');
            
            const audioCache = useRef({}); 
            const fetchingRef = useRef(new Set());

            useEffect(() => { countLocalItems().then(setLocalCacheCount); }, []);

            const currentLessonItems = useMemo(() => {
                const raw = (activeCourseId === 'builtin' || !cloudCourses[activeCourseId]) ? MANUAL_LESSON : cloudCourses[activeCourseId];
                return raw.map(i => {
                    const n = { ...i };
                    Object.keys(i).forEach(k => n[k.toLowerCase().trim()] = i[k]);
                    return n;
                });
            }, [activeCourseId, cloudCourses]);

            const availableUnits = useMemo(() => [...new Set(currentLessonItems.map(i => i.unit))].filter(Boolean), [currentLessonItems]);

            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                const pool = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                if (pool.length === 0) { setCards([]); return; }
                const practiceCards = (targetMode === 'random') ? [...pool].sort(() => Math.random() - 0.5) : pool;
                setCards(practiceCards); setCurrentIndex(0); setIsFlipped(false); setView('practice'); 
            }, [selectedUnits, practiceMode, currentLessonItems]);

            useEffect(() => {
                if (cards.length === 0 && selectedUnits.length > 0 && availableUnits.length > 0) generatePracticeSet();
                if (selectedUnits.length === 0 && availableUnits.length > 0) setSelectedUnits([availableUnits[0]]);
            }, [availableUnits, cards.length, selectedUnits.length, generatePracticeSet]);

            const fetchVoice = async (primary, secondary) => {
                if (!primary) return null;
                const text = (secondary && secondary.toString().trim() !== "") ? `${primary}。 ${secondary}` : primary;
                if (audioCache.current[text]) return audioCache.current[text];
                if (fetchingRef.current.has(text)) return null;
                try {
                    fetchingRef.current.add(text);
                    const localBase64 = await getLocal(text);
                    if (localBase64) {
                        setTtsStatus('HIT: LOCAL DISK');
                        const audio = new Audio(pcmToWav(localBase64));
                        audioCache.current[text] = audio; return audio;
                    }
                    if (!gasUrl || !useNeural) return null;
                    const response = await fetch(`${gasUrl}${gasUrl.includes('?') ? '&' : '?'}action=tts&text=${encodeURIComponent(text)}`);
                    const result = await response.json();
                    if (result.data) {
                        setTtsStatus(result.source === 'cloud_cache' ? 'HIT: CLOUD DRIVE' : 'HIT: GEMINI API');
                        await saveLocal(text, result.data); countLocalItems().then(setLocalCacheCount);
                        const audio = new Audio(pcmToWav(result.data));
                        audioCache.current[text] = audio; return audio;
                    }
                } catch (err) { setTtsStatus('FALLBACK'); return null; }
                finally { fetchingRef.current.delete(text); }
            };

            const speak = useCallback(async (card) => {
                if (!card?.reading) return;
                const audio = await fetchVoice(card.reading, card.secondaryreading);
                if (audio) {
                    audio.currentTime = 0; audio.playbackRate = parseFloat(speechRate);
                    audio.play().catch(() => {});
                } else {
                    window.speechSynthesis.cancel();
                    const main = new SpeechSynthesisUtterance(card.reading);
                    main.lang = 'ja-JP'; main.rate = parseFloat(speechRate);
                    if (card.secondaryreading) main.onend = () => { 
                        const sec = new SpeechSynthesisUtterance(card.secondaryreading);
                        sec.lang = 'ja-JP'; sec.rate = parseFloat(speechRate);
                        setTimeout(() => window.speechSynthesis.speak(sec), 400); 
                    };
                    window.speechSynthesis.speak(main);
                }
            }, [gasUrl, useNeural, speechRate]);

            const downloadAll = async () => {
                if (!gasUrl) return;
                setDownloadProgress(0);
                const items = currentLessonItems;
                let done = 0;
                for (const item of items) {
                    const text = (item.secondaryreading && item.secondaryreading.trim() !== "") ? `${item.reading}。 ${item.secondaryreading}` : item.reading;
                    const exists = await getLocal(text);
                    if (!exists) {
                        try {
                            const res = await fetch(`${gasUrl}${gasUrl.includes('?') ? '&' : '?'}action=tts&text=${encodeURIComponent(text)}`);
                            const data = await res.json(); if (data.data) await saveLocal(text, data.data);
                        } catch(e) {}
                    }
                    done++; setDownloadProgress(Math.round((done / items.length) * 100));
                }
                setTimeout(() => setDownloadProgress(null), 2000);
                countLocalItems().then(setLocalCacheCount);
            };

            const clearCache = async () => {
                if (confirm('確定要清空手機內的語音檔嗎？')) { await deleteStore(); audioCache.current = {}; countLocalItems().then(setLocalCacheCount); }
            };

            const factoryReset = async () => {
                if (confirm('⚠️ 警告：確定要重設所有資料嗎？')) { localStorage.clear(); await deleteStore(); window.location.reload(); }
            };

            const currentCard = useMemo(() => cards[currentIndex] || {}, [cards, currentIndex]);

            useEffect(() => {
                localStorage.setItem('km_gas_v43', gasUrl);
                localStorage.setItem('km_use_n_v43', JSON.stringify(useNeural));
                localStorage.setItem('km_large_font_v53', JSON.stringify(isLargeFont));
                localStorage.setItem('km_u_v43', JSON.stringify(selectedUnits));
                localStorage.setItem('km_mode_v43', practiceMode);
                localStorage.setItem('km_autospeak_v43', JSON.stringify(autoSpeak));
                localStorage.setItem('km_speechrate_v43', JSON.stringify(speechRate));
                localStorage.setItem('km_c_v43', JSON.stringify(cloudCourses));
                localStorage.setItem('km_a_v43', activeCourseId);
            }, [gasUrl, useNeural, isLargeFont, selectedUnits, practiceMode, autoSpeak, speechRate, cloudCourses, activeCourseId]);

            useEffect(() => {
                if (autoSpeak && cards.length > 0 && view === 'practice' && !isFlipped && currentCard.reading) {
                    const timer = setTimeout(() => speak(currentCard), 900);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, view, autoSpeak, isFlipped, currentCard.reading, speak]);

            const syncFromCloud = async () => {
                if (!gasUrl) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(`${gasUrl}${gasUrl.includes('?') ? '&' : '?'}action=sync`);
                    const data = await res.json();
                    setCloudCourses(data);
                    const ks = Object.keys(data);
                    if (ks.length > 0) { setActiveCourseId(ks[0]); setSelectedUnits([]); alert('同步成功！'); }
                } catch(e) { alert('同步失敗'); }
                finally { setIsSyncing(false); }
            };

            const themePrimary = practiceMode === 'random' ? 'amber' : 'indigo';

            return (
                <div className={`w-full max-w-md h-full bg-slate-50 flex flex-col overflow-hidden relative md:shadow-2xl md:border-x border-slate-200 ${isLargeFont ? 'large-font-mode' : ''}`}>
                    <header className="bg-white border-b px-4 py-2 sticky top-0 z-30 flex justify-between items-center shrink-0 shadow-sm h-14">
                        <div className="flex flex-col text-left">
                            <div className="flex items-center gap-1.5">
                                <h1 className={`text-base font-black text-${themePrimary}-600 leading-none`}>Kana Master</h1>
                                <span className="text-[8px] font-black bg-slate-100 text-slate-400 px-1 rounded leading-tight">{APP_VERSION}</span>
                            </div>
                            <span className="text-[9px] text-slate-400 font-black uppercase mt-0.5 truncate max-w-[100px]">{activeCourseId === 'builtin' ? 'Guide' : activeCourseId}</span>
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="flex bg-slate-100 p-1 rounded-xl gap-0.5 mr-1 shadow-inner">
                                <button onClick={() => { setPracticeMode('order'); generatePracticeSet('order'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'order' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}><Icon name="list-ordered" size={16} /></button>
                                <button onClick={() => { setPracticeMode('random'); generatePracticeSet('random'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'random' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-400'}`}><Icon name="shuffle" size={16} /></button>
                            </div>
                            <button onClick={() => setAutoSpeak(!autoSpeak)} className={`p-2 rounded-xl active:scale-90 ${autoSpeak ? `bg-${themePrimary}-600 text-white shadow-md` : 'bg-slate-100 text-slate-400'}`}><Icon name={autoSpeak ? "volume-2" : "volume-x"} size={18} /></button>
                            <button onClick={() => { if(view === 'settings') generatePracticeSet(); else setView('settings'); }} className={`p-2 rounded-xl transition-colors ${view === 'settings' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}><Icon name="settings" size={18} /></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col min-h-0">
                        {view === 'practice' && (
                            <div className="flex-1 flex flex-col space-y-3 animate-in fade-in duration-500 overflow-hidden">
                                {cards.length > 0 ? (
                                    <>
                                        <div className="shrink-0 flex items-center gap-3 px-1">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-wider whitespace-nowrap leading-none shrink-0">
                                                {currentCard.unit}
                                            </span>
                                            <div className="flex-1 bg-slate-200 h-1 rounded-full overflow-hidden shadow-inner relative">
                                                <div 
                                                    className={`bg-${themePrimary}-500 h-full transition-all duration-300 shadow-[0_0_8px_rgba(79,70,229,0.3)]`} 
                                                    style={{ width: `${((currentIndex + 1) / cards.length) * 100}%` }}
                                                ></div>
                                            </div>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-wider whitespace-nowrap leading-none shrink-0">
                                                {currentIndex + 1} / {cards.length}
                                            </span>
                                        </div>
                                        
                                        <div className={`relative flex-1 min-h-[280px] max-h-[500px] w-full perspective-1000 cursor-pointer transform-style-3d transition-transform duration-500 ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden border border-slate-100 ${isFlipped ? 'hidden' : 'flex'}`}>
                                                <div className="h-[20%] flex items-center justify-center bg-indigo-50/15 relative shrink-0">
                                                    <span className={`${isLargeFont ? 'text-7xl' : 'text-6xl'} animate-bounce-slow`}>{currentCard.emoji}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className={`absolute top-4 right-4 bg-${themePrimary}-600 text-white p-2.5 rounded-full shadow-lg active:scale-90`}><Icon name="volume-2" size={18}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center px-6 py-2 text-center overflow-hidden">
                                                    <div className="flex-1 flex items-center justify-center w-full">
                                                        <RubyText text={currentCard.primary} className={`${(currentCard.primary || '').length > 6 ? (isLargeFont ? 'text-4xl' : 'text-3xl') : (isLargeFont ? 'text-7xl' : 'text-6xl')} font-black text-slate-800 transition-all break-words`} />
                                                    </div>
                                                    {currentCard.secondary && (
                                                        <div className="mt-2 mb-4 bg-indigo-50/50 px-5 py-3 rounded-[1.5rem] border border-indigo-100/30 w-full min-h-[4rem] flex items-center justify-center shrink-0">
                                                            <RubyText text={currentCard.secondary} className={`${isLargeFont ? 'text-2xl' : 'text-xl'} text-indigo-600 font-bold italic leading-tight`} />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-indigo-100 ${isFlipped ? 'flex' : 'hidden'}`}>
                                                <div className="h-12 flex items-center justify-between px-6 bg-slate-50 border-b shrink-0">
                                                    <div className="flex items-center gap-2"><span className="text-xl">{currentCard.emoji}</span><RubyText text={currentCard.primary} className="text-sm font-black text-slate-400" /></div>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="text-indigo-600 p-2 active:scale-90"><Icon name="volume-2" size={18}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-5 text-center space-y-3 overflow-y-auto no-scrollbar">
                                                    <div className="space-y-0.5"><h3 className={`${isLargeFont ? 'text-4xl' : 'text-3xl'} font-black text-indigo-600 leading-tight`}>{currentCard.meaning}</h3><p className="text-[9px] font-bold text-slate-300 uppercase tracking-widest text-center w-full">翻譯</p></div>
                                                    {currentCard.secondary && <div className="bg-indigo-50/40 p-4 rounded-[1.5rem] w-full min-h-[5rem] flex items-center justify-center"><RubyText text={currentCard.secondary} className={`${isLargeFont ? 'text-3xl' : 'text-2xl'} text-slate-700 font-bold leading-snug`} /></div>}
                                                    <div className="w-full text-left space-y-2 pt-1 text-xs">
                                                        {currentCard.notes && <div className={`${isLargeFont ? 'text-xs' : 'text-[10px]'} bg-slate-50 p-3 rounded-2xl border border-slate-100 text-slate-500 leading-relaxed font-bold`}>{currentCard.notes}</div>}
                                                        <div className="bg-rose-50/30 p-2 rounded-xl border border-rose-100/20">
                                                            <div className="flex justify-between items-center mb-0.5 text-[7px] font-black uppercase">
                                                                <p className="text-rose-400 font-black">Hybrid Strategy</p>
                                                                <span className="bg-emerald-500 text-white px-1.5 py-0.5 rounded-full font-black scale-75 uppercase tracking-tighter">{ttsStatus}</span>
                                                            </div>
                                                            <p className="text-[8px] font-mono text-rose-500/50 truncate tracking-tight">{currentCard.reading} {currentCard.secondaryreading}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        {/* 按鈕區塊：設定 shrink-0 並配合 safe-bottom 確保不溢出 */}
                                        <div className="grid grid-cols-2 gap-4 shrink-0 pb-[calc(var(--safe-bottom)+0.5rem)] pt-1">
                                            <button onClick={() => { if(currentIndex>0) { setIsFlipped(false); setCurrentIndex(p=>p-1); } }} disabled={currentIndex === 0} className="bg-white border py-3 rounded-2xl font-black text-slate-400 disabled:opacity-30 active:scale-95 transition-all shadow-sm text-xs uppercase tracking-widest">PREV</button>
                                            <button onClick={() => { if(currentIndex < cards.length-1) { setIsFlipped(false); setCurrentIndex(p=>p+1); } else generatePracticeSet(); }} className={`bg-${themePrimary}-600 text-white py-3 rounded-2xl font-black shadow-lg active:scale-95 transition-all text-xs uppercase tracking-widest`}>NEXT</button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center p-10 text-slate-300 font-bold space-y-4 text-center"><Icon name="search-x" size={48} /><p>尚未選擇單元或同步課程</p><button onClick={() => setView('settings')} className="bg-slate-200 text-slate-500 px-6 py-2 rounded-full text-xs uppercase font-black">前往設定</button></div>
                                )}
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-4 text-left animate-in slide-in-from-bottom-4 duration-500 pb-36">
                                <section className="bg-white p-5 rounded-[2.5rem] shadow-lg space-y-4">
                                    <div className="flex justify-between items-center"><h2 className="text-sm font-black text-slate-700 uppercase tracking-widest flex items-center gap-2"><Icon name="book-open" size={16} className="text-indigo-600" /> 學習範圍</h2><span className="text-[10px] font-black text-indigo-400 bg-indigo-50 px-2 py-0.5 rounded-full uppercase">Main</span></div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-1">選擇課程</label>
                                        <select value={activeCourseId} onChange={(e) => { setActiveCourseId(e.target.value); setSelectedUnits([]); }} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold border-none outline-none ring-1 ring-slate-100 focus:ring-indigo-500"><option value="builtin">💡 使用手冊與導覽</option>{Object.keys(cloudCourses).map(n => <option key={n} value={n}>{n}</option>)}</select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-1">選擇單元 ({selectedUnits.length}/{availableUnits.length})</label>
                                        <div className="grid grid-cols-2 gap-2">{availableUnits.map(u => (<button key={u} onClick={() => setSelectedUnits(prev => prev.includes(u) ? prev.filter(x => x !== u) : [...prev, u])} className={`py-2.5 px-2 rounded-xl text-[10px] font-black border transition-all ${selectedUnits.includes(u) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-400 border-slate-100'}`}>{u}</button>))}</div>
                                    </div>
                                </section>

                                <section className="bg-white rounded-[1.5rem] shadow-md overflow-hidden border border-slate-50 transition-all">
                                    <button onClick={() => toggleSection('pref')} className="w-full p-5 flex justify-between items-center active:bg-slate-50 transition-colors">
                                        <div className="text-left"><h3 className="text-sm font-black text-slate-700 flex items-center gap-2"><Icon name="sliders" size={16} className="text-amber-500" /> 偏好設定</h3><p className="text-[10px] text-slate-400 font-bold mt-0.5">目前：{speechRate}x / {useNeural ? '高品質' : '標準'} / {isLargeFont ? '大字' : '標準字'}</p></div>
                                        <Icon name={openSections.pref ? "chevron-up" : "chevron-down"} size={18} className="text-slate-300" />
                                    </button>
                                    {openSections.pref && (
                                        <div className="px-5 pb-6 space-y-4 animate-in slide-in-from-top-2">
                                            <div className="pt-2 space-y-3">
                                                <div className="flex justify-between items-center"><span className="text-[11px] font-black text-slate-500 uppercase">發音速度: {speechRate}x</span><input type="range" min="0.5" max="1.5" step="0.1" value={speechRate} onChange={(e) => setSpeechRate(parseFloat(e.target.value))} className="w-1/2 accent-indigo-600 h-1 bg-slate-100 rounded-lg appearance-none cursor-pointer" /></div>
                                                <label className="flex items-center justify-between cursor-pointer p-3 bg-slate-50 rounded-xl"><div className="flex flex-col"><span className="text-xs font-bold text-slate-600 text-left">啟用高品質神經發音</span><span className="text-[8px] text-slate-400 text-left uppercase">VOICEVOX / Gemini API</span></div><input type="checkbox" checked={useNeural} onChange={(e) => setUseNeural(e.target.checked)} className="w-5 h-5 rounded-md accent-indigo-600" /></label>
                                                <label className="flex items-center justify-between cursor-pointer p-3 bg-indigo-50/50 rounded-xl border border-indigo-100/50"><div className="flex flex-col"><span className="text-xs font-bold text-indigo-700 text-left font-black text-[11px]">大字版面模式</span><span className="text-[8px] text-indigo-400 text-left uppercase">放大漢字上的假名與主文字</span></div><input type="checkbox" checked={isLargeFont} onChange={(e) => setIsLargeFont(e.target.checked)} className="w-5 h-5 rounded-md accent-indigo-600" /></label>
                                            </div>
                                        </div>
                                    )}
                                </section>

                                <section className="bg-white rounded-[1.5rem] shadow-md overflow-hidden border border-slate-50 transition-all">
                                    <button onClick={() => toggleSection('sync')} className="w-full p-5 flex justify-between items-center active:bg-slate-50 transition-colors">
                                        <div className="text-left"><h3 className="text-sm font-black text-slate-700 flex items-center gap-2"><Icon name="refresh-cw" size={16} className="text-emerald-500" /> 連線與同步</h3><p className="text-[10px] text-slate-400 font-bold mt-0.5">狀態：{gasUrl ? '雲端已連線' : '尚未設定網址'}</p></div>
                                        <Icon name={openSections.sync ? "chevron-up" : "chevron-down"} size={18} className="text-slate-300" />
                                    </button>
                                    {openSections.sync && (
                                        <div className="px-5 pb-6 space-y-4 animate-in slide-in-from-top-2">
                                            <div className="pt-2 space-y-3">
                                                <input type="text" placeholder="貼上 GAS Web App URL" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-[10px] font-mono border-none outline-none ring-1 ring-slate-100 focus:ring-indigo-500" />
                                                <button onClick={syncFromCloud} disabled={!gasUrl || isSyncing} className={`w-full py-3 rounded-xl bg-slate-800 text-white font-black text-xs active:scale-95 transition-all ${isSyncing ? 'opacity-50' : ''}`}>{isSyncing ? '同步中...' : '從雲端同步課程清單'}</button>
                                                <div className="pt-2 border-t border-slate-100"><button onClick={factoryReset} className="text-rose-400 text-[10px] font-black uppercase flex items-center gap-1 hover:text-rose-600 transition-colors"><Icon name="trash-2" size={12} /> 重設應用程式 (Factory Reset)</button></div>
                                            </div>
                                        </div>
                                    )}
                                </section>

                                <section className="bg-white rounded-[1.5rem] shadow-md overflow-hidden border border-slate-50 transition-all">
                                    <button onClick={() => toggleSection('voice')} className="w-full p-5 flex justify-between items-center active:bg-slate-50 transition-colors">
                                        <div className="text-left"><h3 className="text-sm font-black text-slate-700 flex items-center gap-2"><Icon name="database" size={16} className="text-rose-500" /> 語音資源管理</h3><p className="text-[10px] text-slate-400 font-bold mt-0.5">離線快取：{localCacheCount} 個檔案</p></div>
                                        <Icon name={openSections.voice ? "chevron-up" : "chevron-down"} size={18} className="text-slate-300" />
                                    </button>
                                    {openSections.voice && (
                                        <div className="px-5 pb-6 space-y-4 animate-in slide-in-from-top-2">
                                            <div className="pt-2 bg-indigo-50/50 p-4 rounded-2xl space-y-3">
                                                {downloadProgress !== null ? (
                                                    <div className="space-y-1"><div className="flex justify-between text-[10px] font-bold text-indigo-400 uppercase"><span>Downloading...</span><span>{downloadProgress}%</span></div><div className="w-full bg-white h-1.5 rounded-full overflow-hidden mt-1"><div className="bg-indigo-600 h-full transition-all" style={{ width: `${downloadProgress}%` }}></div></div></div>
                                                ) : (
                                                    <div className="flex gap-2"><button onClick={downloadAll} className="flex-1 bg-indigo-600 text-white text-[10px] py-2.5 rounded-xl font-black shadow-sm active:scale-95 transition-all">下載高品質離線包</button><button onClick={clearCache} className="bg-white border border-rose-200 text-rose-500 text-[10px] py-2.5 px-3 rounded-xl font-black active:scale-95 transition-all">清除音訊</button></div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </section>
                                <div className="h-10"></div>
                            </div>
                        )}

                        {/* 固定按鈕：定位改為基於 safe-bottom 偏移 */}
                        {view === 'settings' && (
                            <div className="absolute bottom-[calc(var(--safe-bottom)+1rem)] left-4 right-4 flex justify-center z-40">
                                <button onClick={() => generatePracticeSet()} className="bg-slate-900 text-white w-full py-4 rounded-full font-black shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all border-2 border-white/20"><Icon name="check-circle" size={18} /><span className="text-xs font-black uppercase tracking-widest font-black text-xs">套用設定並開始</span></button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
