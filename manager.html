<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanaMaster Manager v2.0 - MP3 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 lamejs 進行前端 MP3 轉碼 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .recording-pulse { animation: pulse-slow 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-black text-indigo-600 flex items-center gap-2">
                    <span class="bg-indigo-600 text-white p-1.5 rounded-lg">KM</span> 
                    Manager <span class="text-slate-400 text-sm font-bold">v2.0</span>
                </h1>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">MP3 Audio Encoding Engine</p>
            </div>
            <div id="statusTag" class="px-4 py-1.5 rounded-full bg-slate-100 text-slate-500 text-[10px] font-black uppercase tracking-tighter">
                Ready to Encode
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Column: Config -->
            <div class="md:col-span-1 space-y-6">
                <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                    <h2 class="text-xs font-black text-slate-400 uppercase border-b pb-2">連線設定</h2>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">GAS Web App URL</label>
                        <input type="text" id="gasUrl" class="w-full p-2.5 bg-slate-50 border-none rounded-xl text-xs font-mono outline-none ring-1 ring-slate-100 focus:ring-indigo-500" placeholder="https://script.google.com/macros/s/...">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">Voicevox 地址 (本地)</label>
                        <input type="text" id="vvUrl" class="w-full p-2.5 bg-slate-50 border-none rounded-xl text-xs font-mono outline-none ring-1 ring-slate-100 focus:ring-indigo-500" value="http://127.0.0.1:50021">
                    </div>
                    <div class="pt-2">
                        <button id="saveConfig" class="w-full py-3 bg-slate-800 text-white rounded-xl text-xs font-black hover:bg-slate-700 transition-all">儲存設定</button>
                    </div>
                </section>

                <section class="bg-indigo-600 p-6 rounded-3xl shadow-lg text-white space-y-4">
                    <h2 class="text-xs font-black text-indigo-200 uppercase border-b border-indigo-500 pb-2">MP3 遷移工具</h2>
                    <p class="text-[10px] text-indigo-100 leading-relaxed">此工具會從舊資料夾讀取 WAV，轉碼為 MP3 後存入新資料夾。</p>
                    <button id="migrateBtn" class="w-full py-4 bg-white text-indigo-600 rounded-2xl text-sm font-black shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4"></i> 開始資料遷移
                    </button>
                    <div id="migrationProgress" class="hidden">
                        <div class="h-1.5 bg-indigo-800 rounded-full overflow-hidden">
                            <div id="migrateBar" class="h-full bg-emerald-400 w-0 transition-all"></div>
                        </div>
                        <p id="migrateStatus" class="text-[9px] mt-2 text-center font-bold">準備中...</p>
                    </div>
                </section>
            </div>

            <!-- Right Column: Operations -->
            <div class="md:col-span-2 space-y-6">
                <section class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col h-[500px]">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xs font-black text-slate-400 uppercase">執行日誌 (Encoding Log)</h2>
                        <button id="clearLog" class="text-[10px] font-bold text-rose-400 uppercase hover:text-rose-600">清除</button>
                    </div>
                    <div id="logArea" class="log-container flex-1 bg-slate-900 rounded-2xl p-4 font-mono text-[11px] text-emerald-400 overflow-y-auto whitespace-pre-wrap leading-relaxed shadow-inner">
> System initialized. 
> lamejs loaded. Ready for MP3 encoding.
> Awaiting operations...
                    </div>
                </section>

                <section class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-xs font-black text-slate-400 uppercase mb-4">手動補完作業</h2>
                    <div class="flex gap-4">
                        <button id="syncManual" class="flex-1 py-4 bg-indigo-50 text-indigo-600 rounded-2xl text-xs font-black hover:bg-indigo-100 transition-all border border-indigo-100 flex items-center justify-center gap-2">
                            <i data-lucide="refresh-ccw" class="w-4 h-4"></i> 掃描並補齊 MP3 缺口
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script type="module">
        import { createIcons, RefreshCcw, Zap, Save, CheckCircle2 } from 'https://unpkg.com/lucide@latest?module';
        createIcons({ icons: { RefreshCcw, Zap, Save, CheckCircle2 } });

        const dom = {
            gasUrl: document.getElementById('gasUrl'),
            vvUrl: document.getElementById('vvUrl'),
            logArea: document.getElementById('logArea'),
            migrateBtn: document.getElementById('migrateBtn'),
            migrateBar: document.getElementById('migrateBar'),
            migrateStatus: document.getElementById('migrateStatus'),
            migrationProgress: document.getElementById('migrationProgress'),
            statusTag: document.getElementById('statusTag')
        };

        // --- 初始化設定 ---
        dom.gasUrl.value = localStorage.getItem('km_manager_gas') || '';
        dom.vvUrl.value = localStorage.getItem('km_manager_vv') || 'http://127.0.0.1:50021';

        document.getElementById('saveConfig').onclick = () => {
            localStorage.setItem('km_manager_gas', dom.gasUrl.value);
            localStorage.setItem('km_manager_vv', dom.vvUrl.value);
            log('Settings saved to local storage.', 'indigo');
        };

        function log(msg, color = 'emerald') {
            const colors = { emerald: 'text-emerald-400', rose: 'text-rose-400', amber: 'text-amber-400', indigo: 'text-indigo-300' };
            const time = new Date().toLocaleTimeString();
            dom.logArea.innerHTML += `\n<span class="text-slate-500">[${time}]</span> <span class="${colors[color]}">${msg}</span>`;
            dom.logArea.scrollTop = dom.logArea.scrollHeight;
        }

        // --- MP3 編碼核心 ---
        async function encodeToMp3(wavBuffer) {
            // 由於 Voicevox 產出的是標準 WAV，我們需要跳過 44 bytes 的檔頭取 PCM16 數據
            const pcmData = new Int16Array(wavBuffer.slice(44));
            const mp3encoder = new lamejs.Mp3Encoder(1, 24000, 128); // 單聲道, 24kHz, 128kbps
            const mp3Data = [];
            const sampleBlockSize = 576; // lamejs 的處理區塊大小

            for (let i = 0; i < pcmData.length; i += sampleBlockSize) {
                const sampleChunk = pcmData.subarray(i, i + sampleBlockSize);
                const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                if (mp3buf.length > 0) mp3Data.push(new Uint8Array(mp3buf));
            }
            const endBuf = mp3encoder.flush();
            if (endBuf.length > 0) mp3Data.push(new Uint8Array(endBuf));

            // 合併 Blob 並轉 Base64
            const blob = new Blob(mp3Data, { type: 'audio/mp3' });
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]); // 只取 base64 部分
                reader.readAsDataURL(blob);
            });
        }

        // --- 存檔至 GAS ---
        async function saveToCloud(text, base64) {
            const url = dom.gasUrl.value;
            const res = await fetch(`${url}${url.includes('?') ? '&' : '?'}action=save_audio&format=mp3`, {
                method: 'POST',
                body: JSON.stringify({ text, data: base64 })
            });
            return res.json();
        }

        // --- 遷移工具邏輯 ---
        dom.migrateBtn.onclick = async () => {
            if (!dom.gasUrl.value) return alert('請先設定 GAS URL');
            if (!confirm('確定要啟動遷移工具嗎？這會讀取舊的 WAV 並轉存為 MP3。')) return;

            dom.migrationProgress.classList.remove('hidden');
            dom.migrateBtn.disabled = true;
            dom.statusTag.innerText = "MIGRATING...";
            dom.statusTag.classList.add('recording-pulse');

            try {
                log('Fetching course list and existing cache...', 'amber');
                const res = await fetch(`${dom.gasUrl.value}${dom.gasUrl.value.includes('?') ? '&' : '?'}action=sync`);
                const courses = await res.json();
                
                // 展平所有單字
                let allItems = [];
                Object.values(courses).forEach(items => allItems = allItems.concat(items));
                
                // 建立任務清單
                const tasks = allItems.map(i => (i.secondaryreading && i.secondaryreading.trim() !== "") ? `${i.reading}。 ${i.secondaryreading}` : i.reading);
                const uniqueTasks = [...new Set(tasks)];
                
                log(`Found ${uniqueTasks.length} unique audio tasks. Starting conversion...`, 'indigo');

                let count = 0;
                for (const text of uniqueTasks) {
                    try {
                        // 1. 從舊系統抓取原始 WAV (假設舊系統暫時還在服務)
                        log(`Processing: ${text.substring(0, 10)}...`, 'slate');
                        const fetchRes = await fetch(`${dom.gasUrl.value}${dom.gasUrl.value.includes('?') ? '&' : '?'}action=tts&text=${encodeURIComponent(text)}`);
                        const result = await fetchRes.json();
                        
                        if (result.data) {
                            // 2. 轉碼為 MP3
                            // 檢查來源：如果是舊的 pcmToWav 格式，我們需要先還原成 binary
                            const binary = atob(result.data);
                            const arrayBuffer = new ArrayBuffer(binary.length);
                            const view = new Uint8Array(arrayBuffer);
                            for(let i=0; i<binary.length; i++) view[i] = binary.charCodeAt(i);

                            const mp3Base64 = await encodeToMp3(arrayBuffer);
                            
                            // 3. 存入新資料夾 (透過 format=mp3 參數)
                            await saveToCloud(text, mp3Base64);
                            log(`✓ Converted and Saved as MP3`, 'emerald');
                        }
                    } catch (e) {
                        log(`✕ Failed to process: ${text}`, 'rose');
                    }
                    
                    count++;
                    const progress = Math.round((count / uniqueTasks.length) * 100);
                    dom.migrateBar.style.width = `${progress}%`;
                    dom.migrateStatus.innerText = `已完成: ${count} / ${uniqueTasks.length}`;
                }

                log('MIGRATION COMPLETED SUCCESSFULLY!', 'emerald');
                dom.statusTag.innerText = "COMPLETED";
            } catch (err) {
                log(`CRITICAL ERROR: ${err.message}`, 'rose');
            } finally {
                dom.migrateBtn.disabled = false;
                dom.statusTag.classList.remove('recording-pulse');
            }
        };

        // --- 補完缺口邏輯 ---
        document.getElementById('syncManual').onclick = async () => {
            // 這裡未來可以寫針對 MP3 資料夾的補齊邏輯
            log('MP3 Scan logic not yet fully implemented. Please use Migration Tool first.', 'amber');
        };

        document.getElementById('clearLog').onclick = () => {
            dom.logArea.innerHTML = '> Log cleared.';
        };
    </script>
</body>
</html>
