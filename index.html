    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kana Master - 五十音設定持久化版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
        @keyframes pulse-slow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.9; } }
        .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 select-none overflow-x-hidden text-slate-800">
    <div id="root"></div>

            { kana: 'ね', romaji: 'ne', row: 'な行', type: 'basic', word: 'ねこ', meaning: '貓', emoji: '🐱', source: '祢' },
            { kana: 'の', romaji: 'no', row: 'な行', type: 'basic', word: 'のり', meaning: '海苔', emoji: '🍙', source: '乃' },
            { kana: 'は', romaji: 'ha', row: 'は行', type: 'basic', word: 'はな', meaning: '花', emoji: '🌸', source: '波' },

            { kana: 'ま', romaji: 'ma', row: 'ま行', type: 'basic', word: 'まど', meaning: '窗戶', emoji: '🪟', source: '末' },
            { kana: 'み', romaji: 'mi', row: 'ま行', type: 'basic', word: 'みかん', meaning: '橘子', emoji: '🍊', source: '美' },

            { kana: 'わ', romaji: 'wa', row: 'わ行', type: 'basic', word: 'わに', meaning: '鱷魚', emoji: '🐊', source: '和' },
            { kana: 'を', romaji: 'wo', row: 'わ行', type: 'basic', word: 'を', meaning: '格助詞', emoji: '📝', source: '遠' },

            { kana: 'が', romaji: 'ga', row: 'が行', type: 'dakuon', word: 'がっこう', meaning: '學校', emoji: '🏫', source: '加' },
            { kana: 'ぎ', romaji: 'gi', row: 'が行', type: 'dakuon', word: 'ぎんこう', meaning: '銀行', emoji: '🏦', source: '幾' },
            { kana: 'ぐ', romaji: 'gu', row: 'が行', type: 'dakuon', word: 'ぐみ', meaning: '軟糖', emoji: '🍬', source: '久' },
            { kana: 'げ', romaji: 'ge', row: 'が行', type: 'dakuon', word: 'げんき', meaning: '元氣', emoji: '💪', source: '計' },
            { kana: 'ご', romaji: 'go', row: 'が行', type: 'dakuon', word: 'ごはん', meaning: '飯', emoji: '🍚', source: '己' },
            { kana: 'ざ', romaji: 'za', row: 'ざ行', type: 'dakuon', word: 'ざっし', meaning: '雜誌', emoji: '📚', source: '左' },
            { kana: 'じ', romaji: 'ji', row: 'ざ行', type: 'dakuon', word: 'じかん', meaning: '時間', emoji: '⏰', source: '之' },
            { kana: 'ず', romaji: 'zu', row: 'ざ行', type: 'dakuon', word: 'ずぼん', meaning: '褲子', emoji: '👖', source: '寸' },
            { kana: 'ぜ', romaji: 'ze', row: 'ざ行', type: 'dakuon', word: 'ぜんぶ', meaning: '全部', emoji: '📦', source: '世' },
            { kana: 'ぞ', romaji: 'zo', row: 'ざ行', type: 'dakuon', word: 'ぞう', meaning: '大象', emoji: '🐘', source: '曽' },
            { kana: 'だ', romaji: 'da', row: 'だ行', type: 'dakuon', word: 'だるま', meaning: '達摩', emoji: '🏮', source: '太' },
            { kana: 'ぢ', romaji: 'ji', row: 'だ行', type: 'dakuon', word: 'はなぢ', meaning: '鼻血', emoji: '🩸', source: '知' },
            { kana: 'づ', romaji: 'zu', row: 'だ行', type: 'dakuon', word: 'みず', meaning: '水', emoji: '💧', source: '川' },
            { kana: 'で', romaji: 'de', row: 'だ行', type: 'dakuon', word: 'でんわ', meaning: '電話', emoji: '📞', source: '天' },
            { kana: 'ど', romaji: 'do', row: 'だ行', type: 'dakuon', word: 'どあ', meaning: '門', emoji: '🚪', source: '止' },
            { kana: 'ば', romaji: 'ba', row: 'ば行', type: 'dakuon', word: 'ばなな', meaning: '香蕉', emoji: '🍌', source: '波' },
            { kana: 'び', romaji: 'bi', row: 'ば行', type: 'dakuon', word: 'びん', meaning: '瓶子', emoji: '🍾', source: '比' },
            { kana: 'ぶ', romaji: 'bu', row: 'ば行', type: 'dakuon', word: 'ぶた', meaning: '豬', emoji: '🐷', source: '不' },
            { kana: 'べ', romaji: 'be', row: 'ば行', type: 'dakuon', word: 'べんとう', meaning: '便當', emoji: '🍱', source: '部' },
            { kana: 'ぼ', romaji: 'bo', row: 'ば行', type: 'dakuon', word: 'ぼうし', meaning: '帽子', emoji: '👒', source: '保' },
            { kana: 'ぱ', romaji: 'pa', row: 'ぱ行', type: 'handakuon', word: 'ぱんだ', meaning: '熊貓', emoji: '🐼', source: '波' },
            { kana: 'ぴ', romaji: 'pi', row: 'ぱ行', type: 'handakuon', word: 'ぴあの', meaning: '鋼琴', emoji: '🎹', source: '比' },
            { kana: 'ぷ', romaji: 'pu', row: 'ぱ行', type: 'handakuon', word: 'ぷりん', meaning: '布丁', emoji: '🍮', source: '不' },
            { kana: 'ぺ', romaji: 'pe', row: 'ぱ行', type: 'handakuon', word: 'ぺん', meaning: '筆', emoji: '🖊️', source: '部' },
            { kana: 'ぽ', romaji: 'po', row: 'ぱ行', type: 'handakuon', word: 'ぽすと', meaning: '郵筒', emoji: '📮', source: '保' },

            // 拗音
            { kana: 'きゃ', romaji: 'kya', row: 'きゃ行', type: 'youon', word: 'きゃく', meaning: '客人', emoji: '👤', source: '幾+也' },
            { kana: 'きゅ', romaji: 'kyu', row: 'きゃ行', type: 'youon', word: 'きゅうり', meaning: '小黃瓜', emoji: '🥒', source: '幾+由' },
            { kana: 'きょ', romaji: 'kyo', row: 'きゃ行', type: 'youon', word: 'きょり', meaning: '距離', emoji: '📏', source: '幾+與' },
            { kana: 'しゃ', romaji: 'sha', row: 'しゃ行', type: 'youon', word: 'しゃしん', meaning: '照片', emoji: '📷', source: '之+也' },
            { kana: 'しゅ', romaji: 'shu', row: 'しゃ行', type: 'youon', word: 'しゅくだい', meaning: '作業', emoji: '📝', source: '之+由' },
            { kana: 'しょ', romaji: 'sho', row: 'しゃ行', type: 'youon', word: 'しょくどう', meaning: '食堂', emoji: '🏢', source: '之+與' },
            { kana: 'ちゃ', romaji: 'cha', row: 'ちゃ行', type: 'youon', word: 'おちゃ', meaning: '茶', emoji: '🍵', source: '知+也' },
            { kana: 'ちゅ', romaji: 'chu', row: 'ちゃ行', type: 'youon', word: 'ちゅうしゃ', meaning: '注射', emoji: '💉', source: '知+由' },
            { kana: 'ちょ', romaji: 'cho', row: 'ちゃ行', type: 'youon', word: 'ちょこ', meaning: '巧克力', emoji: '🍫', source: '知+與' }
        ];

        const ROW_GROUPS = {
            '基本音': ['あ行', 'か行', 'さ行', 'た行', 'な行', 'は行', 'ま行', 'や行', 'ら行', 'わ行', '鼻音'],
            '濁音/半濁音': ['が行', 'ざ行', 'だ行', 'ば行', 'ぱ行'],
            '拗音': ['きゃ行', 'しゃ行', 'ちゃ行']
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            // --- 持久化狀態管理 ---
            const [selectedRows, setSelectedRows] = useState(() => {
                const saved = localStorage.getItem('kana_selected_rows');
                return saved ? JSON.parse(saved) : ['あ行'];
            });

            const [showSource, setShowSource] = useState(() => {
                const saved = localStorage.getItem('kana_show_source');
                return saved !== null ? JSON.parse(saved) : true;
            });

            const [weakList, setWeakList] = useState(() => {
                const saved = localStorage.getItem('kana_weak_list');
                return saved ? JSON.parse(saved) : [];
            });

            // 監聽狀態並儲存
            useEffect(() => { localStorage.setItem('kana_selected_rows', JSON.stringify(selectedRows)); }, [selectedRows]);
            useEffect(() => { localStorage.setItem('kana_show_source', JSON.stringify(showSource)); }, [showSource]);
            useEffect(() => { localStorage.setItem('kana_weak_list', JSON.stringify(weakList)); }, [weakList]);

            const generatePracticeSet = (mode = 'normal') => {
                let pool = mode === 'weak' ? KANA_DATA.filter(i => weakList.includes(i.kana)) : KANA_DATA.filter(i => selectedRows.includes(i.row));
                const shuffled = [...pool].sort(() => Math.random() - 0.5);
                setCards(shuffled.length > 0 ? shuffled : [KANA_DATA[0]]);
                setCurrentIndex(0);
                setIsFlipped(false);
                setView('practice');
            };

            useEffect(() => { generatePracticeSet(); }, []);

            const speak = (card) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(`${card.kana}。 ${card.word}`);
                utterance.lang = 'ja-JP'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            };

            const toggleWeak = (kana) => setWeakList(p => p.includes(kana) ? p.filter(k => k !== kana) : [...p, kana]);
            const currentCard = cards[currentIndex] || {};
            const isWeak = weakList.includes(currentCard.kana);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10">
                    <header className="bg-white border-b px-4 py-2 sticky top-0 z-10 flex justify-between items-center shadow-sm h-14">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-bold text-indigo-600 leading-none">Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-bold tracking-widest uppercase mt-0.5 text-center">Persistence Enabled</span>
                        </div>
                        <div className="flex gap-1">
                            {weakList.length > 0 && view !== 'settings' && (
                                <button onClick={() => generatePracticeSet('weak')} className="p-2 text-amber-500 flex items-center gap-1 transition-transform active:scale-90"><Icon name="zap" size={20} /><span className="text-xs font-black">{weakList.length}</span></button>
                            )}
                            <button onClick={() => setView('settings')} className="p-2 text-slate-400 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4">
                        {view === 'practice' && (
                            <div className="space-y-4 animate-in fade-in duration-500">
                                <div className="flex justify-between items-end mb-1 px-1">
                                    <div className="text-[10px] font-black text-indigo-400 tracking-widest uppercase">Progress</div>
                                    <div className="text-[10px] font-black text-slate-400">{currentIndex + 1} / {cards.length}</div>
                                </div>
                                <div className="w-full bg-slate-200 h-1 rounded-full overflow-hidden">
                                    <div className="bg-indigo-500 h-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / cards.length) * 100}%` }}></div>
                                </div>

                                <div className={`relative h-[480px] w-full perspective-1000 cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`absolute inset-0 bg-white rounded-[2rem] shadow-lg flex flex-col overflow-hidden backface-hidden border border-slate-100 ${isFlipped ? 'hidden' : 'flex'}`}>
                                        <div className="h-1/3 flex items-center justify-center bg-indigo-50/30 relative">
                                            <span className="text-8xl animate-bounce-slow drop-shadow-sm">{currentCard.emoji}</span>
                                            {showSource && <div className="absolute top-3 right-4 bg-white/90 backdrop-blur px-2.5 py-0.5 rounded-full shadow-sm border border-indigo-100 flex items-center gap-1"><span className="text-[10px] font-bold text-indigo-400">源自</span><span className="text-lg font-black text-indigo-600">{currentCard.source}</span></div>}
                                            {isWeak && <div className="absolute top-3 left-4 text-amber-500"><Icon name="zap" size={20} /></div>}
                                        </div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4">
                                            <span className={`${currentCard.kana?.length > 1 ? 'text-7xl' : 'text-8xl'} font-black text-slate-800 leading-none`}>{currentCard.kana}</span>
                                            <div className="mt-4 text-center"><p className="text-indigo-600 font-bold text-xl">{currentCard.word}</p><p className="text-slate-400 text-[11px] font-medium">{currentCard.meaning}</p></div>
                                        </div>
                                        <div className="h-12 flex items-center justify-center text-slate-300 text-[9px] font-bold uppercase tracking-[0.2em] border-t border-slate-50 text-center">點擊翻面查看讀音</div>
                                    </div>
                                    <div className={`absolute inset-0 bg-white rounded-[2rem] shadow-lg flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-indigo-100 transition-opacity ${isFlipped ? 'flex' : 'hidden'}`}>
                                        <div className="h-1/4 flex items-center justify-center bg-slate-50/50 relative">
                                            <span className="text-7xl opacity-30 grayscale">{currentCard.emoji}</span>
                                            <button onClick={(e) => { e.stopPropagation(); toggleWeak(currentCard.kana); }} className={`absolute top-4 right-4 p-3 rounded-2xl border transition-all ${isWeak ? 'bg-amber-500 border-amber-500 text-white shadow-lg' : 'bg-white border-slate-200 text-slate-400'}`}><Icon name="zap" size={20} /></button>
                                        </div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                                            <div className="mb-4">
                                                <div className="flex items-baseline justify-center gap-3">
                                                    <span className="text-7xl font-black text-indigo-600 uppercase tracking-tighter drop-shadow-sm">{currentCard.romaji}</span>
                                                    <span className="text-3xl font-bold text-slate-300">({currentCard.kana})</span>
                                                </div>
                                            </div>
                                            <div className="px-5 py-1.5 bg-indigo-600 rounded-xl shadow-md mb-2"><span className="text-white font-black text-xl">{currentCard.word}</span></div>
                                            <div className="flex items-center gap-2 mb-4"><span className="text-xs font-bold text-slate-400 uppercase tracking-tighter">Meaning:</span><span className="text-slate-500 font-black text-base">{currentCard.meaning}</span></div>
                                            <div className="flex items-center gap-6"><div className="flex items-center gap-1.5 bg-slate-100 px-3 py-1 rounded-lg"><span className="text-[10px] font-bold text-slate-400 uppercase">Origin</span><span className="text-lg font-black text-slate-600">{currentCard.source}</span></div><button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="bg-indigo-600 text-white p-4 rounded-full shadow-lg active:scale-90 transition-transform"><Icon name="volume-2" size={28} /></button></div>
                                        </div>
                                        <div className="h-12 flex items-center justify-center text-indigo-200 text-[9px] font-bold uppercase tracking-[0.2em] border-t border-indigo-50 text-center">點擊翻面回到假名</div>
                                    </div>
                                </div>

                                <div className="flex gap-3 px-1 mt-4">
                                    <button onClick={() => { setIsFlipped(false); setTimeout(() => setCurrentIndex((prev) => (prev + 1) % cards.length), 50); }} className="flex-[3] bg-white border border-slate-200 py-4 rounded-2xl font-black text-slate-500 text-sm shadow-sm active:bg-slate-100 transition-colors">NEXT KANA</button>
                                    <button onClick={() => generatePracticeSet()} className="flex-1 bg-slate-900 py-4 rounded-2xl font-black text-white shadow-md active:scale-95 flex items-center justify-center transition-transform"><Icon name="shuffle" size={18} /></button>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 pb-12">
                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>記憶輔助</h2>
                                    <div className="space-y-2">
                                        <label className="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm cursor-pointer active:bg-slate-50">
                                            <div className="flex flex-col"><span className="font-black text-slate-700 text-sm">顯示起源漢字</span><span className="text-[9px] text-slate-400 uppercase font-bold tracking-tight">Show Origin</span></div>
                                            <input type="checkbox" checked={showSource} onChange={(e) => setShowSource(e.target.checked)} className="w-5 h-5 accent-indigo-600 rounded cursor-pointer" />
                                        </label>
                                        <div className="p-4 bg-amber-50 border border-amber-100 rounded-2xl flex justify-between items-center shadow-sm">
                                            <div className="flex flex-col"><span className="font-black text-amber-700 text-sm">已記錄弱點</span><span className="text-[9px] text-amber-400 uppercase font-bold tracking-tight">Weak Points Saved</span></div>
                                            <div className="flex items-center gap-2">
                                                <span className="font-black text-amber-600">{weakList.length}</span>
                                                {weakList.length > 0 && (
                                                    <button onClick={() => { if(confirm('確定要清除所有標記嗎？')) setWeakList([]); }} className="text-[10px] bg-white px-2 py-1 rounded-md border border-amber-200 text-amber-400 font-bold active:bg-slate-100">CLEAR</button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {Object.entries(ROW_GROUPS).map(([groupName, rows]) => (
                                    <section key={groupName} className="space-y-3">
                                        <h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>{groupName}</h2>
                                        <div className="grid grid-cols-4 gap-2">
                                            {rows.map(row => (
                                                <button key={row} onClick={() => setSelectedRows(prev => prev.includes(row) ? prev.filter(r => r !== row) : [...prev, row])} className={`py-3 rounded-xl text-[10px] font-black transition-all border ${selectedRows.includes(row) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-400 hover:border-indigo-200'}`}>
                                                    {row.replace('行', '')}
                                                </button>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                                
                                <button onClick={() => generatePracticeSet()} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-95 transition-all flex items-center justify-center gap-2 mt-4"><Icon name="play" size={18} /> 套用並開始練習</button>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-6 left-0 right-0 flex justify-center px-4 z-20">
                            <button onClick={() => setView('practice')} className="bg-white/95 backdrop-blur text-indigo-600 px-8 py-3 rounded-full font-black shadow-xl border border-indigo-50 flex items-center gap-2 active:scale-95 text-sm transition-transform"><Icon name="arrow-left" size={16} /> 返回練習</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
