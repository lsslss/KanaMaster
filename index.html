            { kana: 'パ', romaji: 'pa', row: 'パ行', charType: 'kata', word: 'パスポート', meaning: '護照', emoji: '🛂', source: '八' }
        ];

        // --- 行選單分類 (Key 完全鎖定對應) ---
        const ROW_GROUPS_DETAILED = {
            'hira': {
                '基本音': ['あ行', 'か行', 'さ行', 'た行', 'な行', 'は行', 'ま行', 'や行', 'ら行', 'わ行', '鼻音'],
                '濁音/半濁音': ['が行', 'ざ行', 'だ行', 'ば行', 'ぱ行'],
                '拗音': ['きゃ行']
            },
            'kata': {
                '基本音': ['ア行', 'カ行', 'サ行', 'タ行', 'ナ行', 'ハ行', 'マ行', 'ヤ行', 'ラ行', 'ワ行', '鼻音'],
                '濁音/半濁音': ['ガ行', 'ザ行', 'ダ行', '巴行', 'パ行'],
                '拗音': ['キャ行']
            }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, className]);
            return (
                <span key={name} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        function App() {
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showSRSComplete, setShowSRSComplete] = useState(false);
            const [resetConfirm, setResetConfirm] = useState(false);
            const fileInputRef = useRef(null);

            // --- 持久化狀態 (版本 v27) ---
            const [selectedTypes, setSelectedTypes] = useState(() => JSON.parse(localStorage.getItem('k_types_v27') || '["hira"]'));
            const [selectedRows, setSelectedRows] = useState(() => JSON.parse(localStorage.getItem('k_rows_v27') || '["あ行"]'));
            const [practiceMode, setPracticeMode] = useState(() => localStorage.getItem('k_mode_v27') || 'order'); 
            const [showSource, setShowSource] = useState(() => JSON.parse(localStorage.getItem('k_source_v27') ?? 'true'));
            const [autoSpeak, setAutoSpeak] = useState(() => JSON.parse(localStorage.getItem('k_autospeak_v27') ?? 'false'));
            const [speechRate, setSpeechRate] = useState(() => JSON.parse(localStorage.getItem('k_speechrate_v27') ?? '0.9'));
            const [srsData, setSrsData] = useState(() => JSON.parse(localStorage.getItem('k_srs_v27') || '{}'));

            useEffect(() => {
                localStorage.setItem('k_types_v27', JSON.stringify(selectedTypes));
                localStorage.setItem('k_rows_v27', JSON.stringify(selectedRows));
                localStorage.setItem('k_source_v27', JSON.stringify(showSource));
                localStorage.setItem('k_autospeak_v27', JSON.stringify(autoSpeak));
                localStorage.setItem('k_speechrate_v27', JSON.stringify(speechRate));
                localStorage.setItem('k_srs_v27', JSON.stringify(srsData));
                localStorage.setItem('k_mode_v27', practiceMode);
            }, [selectedTypes, selectedRows, showSource, autoSpeak, speechRate, srsData, practiceMode]);

            // 定義衍生狀態
            const currentCard = cards[currentIndex] || {};
            const srsInfo = srsData[currentCard.kana] || { step: 0, interval: 0 };
            const isWeak = currentCard.kana ? srsInfo.step < 2 : false;

            const dueCount = useMemo(() => {
                const now = Date.now();
                return KANA_DATA.filter(item => {
                    if (!selectedTypes.includes(item.charType) || !selectedRows.includes(item.row)) return false;
                    const rec = srsData[item.kana];
                    return rec && rec.nextReview <= now;
                }).length;
            }, [srsData, selectedTypes, selectedRows]);

            const stats = useMemo(() => {
                const totalInScope = KANA_DATA.filter(i => selectedTypes.includes(i.charType) && selectedRows.includes(i.row));
                const learned = totalInScope.filter(i => (srsData[i.kana]?.step || 0) >= 4).length;
                const learning = totalInScope.filter(i => (srsData[i.kana]?.step || 0) > 0 && (srsData[i.kana]?.step || 0) < 4).length;
                return { total: totalInScope.length, learned, learning };
            }, [srsData, selectedTypes, selectedRows]);

            const theme = useMemo(() => {
                if (view === 'settings') return { bg: 'from-slate-50 to-gray-200', primary: 'indigo', text: 'slate' };
                if (practiceMode === 'anki') return { bg: 'from-purple-50 to-violet-100', primary: 'violet', text: 'purple' };
                if (practiceMode === 'random') return { bg: 'from-orange-50 to-amber-100', primary: 'amber', text: 'amber' };
                return { bg: 'from-blue-50 to-indigo-100', primary: 'indigo', text: 'blue' };
            }, [view, practiceMode]);

            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                const pool = KANA_DATA.filter(i => selectedTypes.includes(i.charType) && selectedRows.includes(i.row));
                let practiceCards = [];
                setShowSRSComplete(false);
                if (targetMode === 'anki') {
                    const now = Date.now();
                    practiceCards = pool.filter(i => { const rec = srsData[i.kana]; return !rec || rec.nextReview <= now; }).sort(() => Math.random() - 0.5);
                    if (practiceCards.length === 0) { setShowSRSComplete(true); setCards([]); return; }
                } else if (targetMode === 'random') {
                    practiceCards = [...pool].sort(() => Math.random() - 0.5);
                } else {
                    practiceCards = pool;
                }
                setCards(practiceCards.length > 0 ? practiceCards : [KANA_DATA[0]]);
                setCurrentIndex(0); setIsFlipped(false); setView('practice');
            }, [selectedTypes, selectedRows, srsData, practiceMode]);

            useEffect(() => { generatePracticeSet(); }, []);

            const speak = useCallback((card) => {
                if (!window.speechSynthesis || !card || !card.kana) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(`${card.kana}。 ${card.word}`);
                utterance.lang = 'ja-JP'; utterance.rate = speechRate;
                window.speechSynthesis.speak(utterance);
            }, [speechRate]);

            useEffect(() => {
                if (autoSpeak && cards.length > 0 && view === 'practice' && !isFlipped && currentCard.kana) {
                    const timer = setTimeout(() => speak(currentCard), 500);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, cards, view, autoSpeak, isFlipped, speak, currentCard]);

            const handleReview = (kana, quality) => {
                if (!kana) return;
                setSrsData(prev => {
                    const now = Date.now();
                    const record = prev[kana] || { interval: 0, ease: 2.5, step: 0 };
                    let { interval, ease, step } = record;
                    if (quality === 1) { interval = 0; step = 0; ease = Math.max(1.3, ease - 0.2); }
                    else if (quality === 2) { interval = interval === 0 ? 0.5 : interval * 1.2; ease = Math.max(1.3, ease - 0.15); }
                    else if (quality === 3) { interval = interval === 0 ? 1 : interval * ease; step++; }
                    else { interval = interval === 0 ? 4 : interval * ease * 1.3; ease += 0.15; }
                    const nextReview = now + (interval * 24 * 60 * 60 * 1000);
                    return { ...prev, [kana]: { interval, ease, step, nextReview } };
                });
                moveNext();
            };

            const moveNext = () => { setIsFlipped(false); setTimeout(() => { if (currentIndex === cards.length - 1) generatePracticeSet(); else setCurrentIndex(prev => prev + 1); }, 100); };
            const movePrev = () => { setIsFlipped(false); setTimeout(() => { if (currentIndex > 0) setCurrentIndex(prev => prev - 1); }, 100); };

            const handleExport = () => {
                const blob = new Blob([JSON.stringify(srsData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `kana_master_progress_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        setSrsData(imported);
                        generatePracticeSet();
                    } catch (err) { alert("匯入失敗：無效的 JSON 檔案。"); }
                };
                reader.readAsText(file);
            };

            return (
                <div className={`min-h-screen bg-gradient-to-br ${theme.bg} text-slate-800 font-sans pb-10 flex flex-col transition-theme`}>
                    <header className="bg-white/80 backdrop-blur-md border-b px-4 py-2 sticky top-0 z-30 flex justify-between items-center shadow-sm h-14 shrink-0">
                        <div className="flex flex-col">
                            <h1 className={`text-lg font-bold text-${theme.primary}-600 leading-none tracking-tight transition-colors`}>Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-black tracking-widest uppercase mt-0.5">
                                {practiceMode === 'anki' ? (dueCount > 0 ? `複習到期: ${dueCount}` : '複習完畢') : practiceMode === 'order' ? '循序模式' : '隨機模式'}
                            </span>
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="flex bg-slate-100 p-1 rounded-xl gap-0.5 shadow-inner">
                                <button onClick={() => { setPracticeMode('order'); generatePracticeSet('order'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'order' && view !== 'settings' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}><Icon name="list-ordered" size={18} /></button>
                                <button onClick={() => { setPracticeMode('random'); generatePracticeSet('random'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'random' && view !== 'settings' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-400'}`}><Icon name="shuffle" size={18} /></button>
                                <button onClick={() => { setPracticeMode('anki'); generatePracticeSet('anki'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'anki' && view !== 'settings' ? 'bg-white shadow-sm text-violet-600' : 'text-slate-400'}`}><Icon name="brain" size={18} /></button>
                            </div>
                            <button onClick={() => setAutoSpeak(!autoSpeak)} className={`p-2 rounded-xl transition-all active:scale-90 ml-1 ${autoSpeak ? `bg-${theme.primary}-600 text-white shadow-md` : 'bg-slate-100 text-slate-400'}`}><Icon name={autoSpeak ? "volume-2" : "volume-x"} size={20} /></button>
                            <button onClick={() => setView('settings')} className={`p-2 rounded-xl transition-colors ${view === 'settings' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 flex-1 w-full overflow-y-auto no-scrollbar">
                        {view === 'practice' && (
                            <div className="space-y-4 h-full flex flex-col">
                                {showSRSComplete ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-6 animate-in zoom-in-95 duration-500">
                                        <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-xl text-violet-500"><Icon name="party-popper" size={48} /></div>
                                        <h2 className="text-2xl font-black text-slate-800 mb-2">今日任務達成！</h2>
                                        <p className="text-slate-500 mb-8 leading-relaxed text-sm italic">"目前已沒有卡片到期，建議換個模式練習。"</p>
                                        <div className="grid grid-cols-2 gap-3 w-full">
                                            <button onClick={() => { setPracticeMode('order'); generatePracticeSet('order'); }} className="bg-indigo-600 py-3 rounded-2xl font-bold text-white shadow-lg">循序學習</button>
                                            <button onClick={() => { setPracticeMode('random'); generatePracticeSet('random'); }} className="bg-amber-500 py-3 rounded-2xl font-bold text-white shadow-lg">隨機練習</button>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="shrink-0">
                                            <div className="flex justify-between items-end mb-1 px-1"><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">練習進度</div><div className="text-[10px] font-black text-slate-500">{currentIndex + 1} / {cards.length}</div></div>
                                            <div className="w-full bg-white/50 h-1.5 rounded-full overflow-hidden shadow-inner"><div className={`bg-${theme.primary}-500 h-full transition-all duration-300`} style={{ width: `${((currentIndex + 1) / Math.max(1, cards.length)) * 100}%` }}></div></div>
                                        </div>
                                        <div className={`relative h-[420px] w-full perspective-1000 cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden backface-hidden border border-white ${isFlipped ? 'hidden' : 'flex'}`}>
                                                <div className={`h-1/3 flex items-center justify-center bg-${theme.primary}-50/50 relative`}>
                                                    <span className="text-8xl animate-bounce-slow drop-shadow-sm">{currentCard.emoji}</span>
                                                    {showSource && currentCard.source && <div className="absolute top-3 right-4 bg-white/90 backdrop-blur px-2.5 py-0.5 rounded-full shadow-sm border border-indigo-100 flex items-center gap-1"><span className="text-[10px] font-bold text-indigo-400 tracking-tighter uppercase">起源</span><span className={`text-lg font-black text-${theme.primary}-600`}>{currentCard.source}</span></div>}
                                                    {isWeak && <div className="absolute top-3 left-4 text-rose-500 animate-pulse"><Icon name="zap" size={20} /></div>}
                                                    <div className="absolute bottom-2 left-4 bg-slate-800 text-white text-[8px] font-black px-2 py-0.5 rounded-md uppercase tracking-widest opacity-40">{currentCard.charType}</div>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                                                    <span className={`${currentCard.kana?.length > 1 ? 'text-7xl' : 'text-8xl'} font-black text-slate-800 leading-none tracking-tighter`}>{currentCard.kana}</span>
                                                    <div className="mt-4"><p className={`text-${theme.primary}-600 font-black text-2xl tracking-tight`}>{currentCard.word}</p><p className="text-slate-400 text-xs font-bold tracking-wide uppercase mt-1">{currentCard.meaning}</p></div>
                                                </div>
                                            </div>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-white transition-opacity ${isFlipped ? 'flex' : 'hidden'}`}>
                                                <div className="h-1/4 flex items-center justify-center bg-slate-50 relative"><span className="text-7xl opacity-30 grayscale">{currentCard.emoji}</span><button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className={`absolute top-4 right-4 bg-${theme.primary}-600 text-white p-3 rounded-full shadow-lg active:scale-95 transition-transform`}><Icon name="volume-2" size={24} /></button></div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                                                    <div className="mb-4"><div className="flex items-baseline justify-center gap-3"><span className={`text-7xl font-black text-${theme.primary}-600 uppercase tracking-tighter`}>{currentCard.romaji}</span><span className="text-3xl font-bold text-slate-200">({currentCard.kana})</span></div></div>
                                                    <div className="flex flex-col items-center gap-2 mb-4"><div className={`px-5 py-1.5 bg-${theme.primary}-600 rounded-2xl shadow-lg`}><span className="text-white font-black text-xl">{currentCard.word}</span></div><span className="text-slate-500 font-bold text-sm uppercase tracking-tight">[{currentCard.meaning}]</span></div>
                                                    <div className="flex items-center gap-3 bg-slate-50 px-3 py-1.5 rounded-2xl border border-slate-100 mt-2">
                                                        <div className="flex flex-col items-center px-2"><span className="text-[8px] font-bold text-slate-400 uppercase">等級</span><span className={`text-sm font-black text-${theme.primary}-500`}>{srsInfo.step}</span></div>
                                                        <div className="w-px h-6 bg-slate-200"></div>
                                                        <div className="flex flex-col items-center px-2"><span className="text-[8px] font-bold text-slate-400 uppercase">間隔</span><span className="text-sm font-black text-slate-600">{Math.round(srsInfo.interval || 0)}天</span></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="pt-2 shrink-0 h-24">
                                            {practiceMode === 'anki' ? (
                                                <div className="grid grid-cols-4 gap-2">
                                                    {[ { q: 1, l: 'Again', c: 'bg-rose-50 text-rose-600 border-rose-100', sub: '<1分' }, { q: 2, l: 'Hard', c: 'bg-orange-50 text-orange-600 border-orange-100', sub: '1天' }, { q: 3, l: 'Good', c: 'bg-emerald-50 text-emerald-600 border-emerald-100', sub: '3天' }, { q: 4, l: 'Easy', c: 'bg-blue-50 text-blue-600 border-blue-100', sub: '7天' } ].map(btn => (
                                                        <button key={btn.q} onClick={(e) => { e.stopPropagation(); handleReview(currentCard.kana, btn.q); }} className={`${btn.c} border-2 py-3 rounded-2xl flex flex-col items-center justify-center active:scale-95 shadow-sm transition-all`}><span className="font-black text-xs uppercase">{btn.l}</span><span className="text-[8px] font-bold opacity-60">{btn.sub}</span></button>
                                                    ))}
                                                </div>
                                            ) : practiceMode === 'random' ? (
                                                <button onClick={moveNext} className="w-full bg-amber-600 text-white py-4 rounded-3xl font-black text-sm flex items-center justify-center gap-2 shadow-xl shadow-amber-100 active:scale-95 transition-all">下一張 <Icon name="arrow-right" size={18} /></button>
                                            ) : (
                                                <div className="grid grid-cols-2 gap-4">
                                                    <button onClick={movePrev} disabled={currentIndex === 0} className="bg-white border-2 border-slate-200 py-4 rounded-3xl font-black text-sm text-slate-600 disabled:opacity-30 active:bg-slate-50 flex items-center justify-center gap-2 transition-all"><Icon name="arrow-left" size={18} /> 上一張</button>
                                                    <button onClick={moveNext} className="bg-indigo-600 text-white py-4 rounded-3xl font-black text-sm shadow-xl shadow-indigo-100 active:scale-95 flex items-center justify-center gap-2 transition-all">下一張 <Icon name="arrow-right" size={18} /></button>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                        {view === 'settings' && (
                            <div className="space-y-6 pb-40 animate-in slide-in-from-bottom-4 duration-500">
                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">學習進度儀表板</h2>
                                    <div className="bg-white/60 backdrop-blur p-5 rounded-[2rem] border border-white shadow-xl flex justify-around">
                                        <div className="text-center"><span className="block text-2xl font-black text-emerald-600">{stats.learned}</span><span className="text-[10px] font-bold text-slate-400 uppercase">已精通</span></div>
                                        <div className="text-center"><span className="block text-2xl font-black text-amber-500">{stats.learning}</span><span className="text-[10px] font-bold text-slate-400 uppercase">學習中</span></div>
                                        <div className="text-center"><span className="block text-2xl font-black text-slate-300">{stats.total - stats.learned - stats.learning}</span><span className="text-[10px] font-bold text-slate-400 uppercase">全新字</span></div>
                                    </div>
                                </section>
                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">系統偏好設定</h2>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-5">
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-center px-1"><span className="text-sm font-black text-slate-600 uppercase tracking-tighter">發音速度: {speechRate}x</span><Icon name="mic-2" size={16} className="text-indigo-400" /></div>
                                            <input type="range" min="0.5" max="1.5" step="0.1" value={speechRate} onChange={(e) => setSpeechRate(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                        </div>
                                        <label className="flex items-center justify-between cursor-pointer"><div className="flex flex-col"><span className="font-black text-slate-700 text-sm">顯示起源漢字</span><span className="text-[9px] text-slate-400 font-bold uppercase tracking-tight">顯示假名源自哪個漢字</span></div><input type="checkbox" checked={showSource} onChange={(e) => setShowSource(e.target.checked)} className="w-6 h-6 rounded-md accent-indigo-600" /></label>
                                    </div>
                                    
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-4">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">進度備份與還原</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={handleExport} className="flex items-center justify-center gap-2 py-3 bg-slate-50 rounded-xl text-xs font-bold text-slate-600 active:bg-slate-100 transition-colors border border-slate-100 font-black"><Icon name="download" size={14} /> 匯出進度</button>
                                            <button onClick={() => fileInputRef.current.click()} className="flex items-center justify-center gap-2 py-3 bg-slate-50 rounded-xl text-xs font-bold text-slate-600 active:bg-slate-100 transition-colors border border-slate-100 font-black"><Icon name="upload" size={14} /> 匯入進度</button>
                                            <input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" className="hidden" />
                                        </div>
                                    </div>

                                    <div className="p-4 bg-white/50 border border-slate-100 rounded-[2rem]">
                                        {!resetConfirm ? (
                                            <button onClick={() => setResetConfirm(true)} className="w-full flex items-center justify-between text-rose-500 font-bold text-xs uppercase tracking-tight group px-2"><span>抹除所有學習數據</span><Icon name="rotate-ccw" size={14} /></button>
                                        ) : (
                                            <div className="flex items-center gap-2 animate-in fade-in slide-in-from-right-2"><span className="text-[10px] font-black text-rose-600 flex-1 uppercase">確定要重置嗎？</span><button onClick={() => setResetConfirm(false)} className="px-3 py-1.5 bg-slate-100 rounded-xl text-[10px] font-black uppercase">取消</button><button onClick={() => { setSrsData({}); setResetConfirm(false); generatePracticeSet(); }} className="px-3 py-1.5 bg-rose-600 text-white rounded-xl text-[10px] font-black shadow-lg">確認</button></div>
                                        )}
                                    </div>
                                </section>
                                <section className="space-y-3"><h2 className="text-base font-black flex items-center gap-2 text-slate-700">文字種類篩選</h2><div className="grid grid-cols-2 gap-3">{[ {id: 'hira', label: '平假名', icon: 'あ'}, {id: 'kata', label: '片假名', icon: 'ア'} ].map(t => (<button key={t.id} onClick={() => setSelectedTypes(prev => prev.includes(t.id) ? prev.filter(x => x !== t.id) : [...prev, t.id])} className={`py-5 rounded-3xl border-2 transition-all ${selectedTypes.includes(t.id) ? 'border-indigo-600 bg-indigo-600 text-white shadow-xl' : 'border-slate-100 bg-white text-slate-300'}`}><span className="text-2xl font-black block">{t.icon}</span><span className="text-[10px] font-black uppercase tracking-widest">{t.label}</span></button>))}</div></section>
                                <section className="space-y-3"><h2 className="text-base font-black flex items-center gap-2 text-slate-700">練習範圍設定</h2><div className="space-y-8">{selectedTypes.map(type => (<div key={type} className="space-y-6 animate-in fade-in"><p className={`text-[10px] font-black text-indigo-500 uppercase tracking-widest px-1 border-b border-indigo-50 pb-2`}>{type === 'hira' ? '平假名' : '片假名'} 列表</p>{Object.entries(ROW_GROUPS_DETAILED[type]).map(([subLabel, rows]) => (<div key={subLabel} className="space-y-2"><span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">{subLabel}</span><div className="grid grid-cols-4 gap-2">{rows.map(row => (<button key={row} onClick={() => setSelectedRows(prev => prev.includes(row) ? prev.filter(r => r !== row) : [...prev, row])} className={`py-3 rounded-2xl text-[11px] font-black transition-all border ${selectedRows.includes(row) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-400 active:border-indigo-200'}`}>{row.replace('行', '')}</button>))}</div></div>))}</div>))}</div></section>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 z-30 pointer-events-none transition-theme"><button onClick={() => { if (view === 'settings') generatePracticeSet(); else setView('practice'); }} className={`pointer-events-auto bg-slate-900 text-white px-10 py-4 rounded-full font-black shadow-2xl border border-indigo-50 flex items-center gap-3 active:scale-95 transition-all animate-in slide-in-from-bottom-6`}><Icon name={view === 'settings' ? "check-circle" : "arrow-left"} size={18} /> <span className="text-sm font-black uppercase tracking-widest">{view === 'settings' ? "套用設定並開始" : "返回"}</span></button></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- 優化的 Service Worker 註冊 ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'kana-master-v1';
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(['./'])));
                        self.skipWaiting();
                    });
                    self.addEventListener('activate', (event) => {
                        event.waitUntil(self.clients.claim());
                    });
                    self.addEventListener('fetch', (event) => {
                        event.respondWith(
                            fetch(event.request).catch(() => caches.match(event.request))
                        );
                    });
                `;
                const blob = new Blob([swCode], { type: 'text/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('PWA SW Registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
