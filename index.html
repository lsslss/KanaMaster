<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>Kana Master - Hybrid Cache v3.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        ruby { display: inline-flex; flex-direction: column-reverse; align-items: center; vertical-align: bottom; margin: 0 1px; line-height: 1.1; }
        ruby rt { display: block; font-size: 0.45em; color: #6366f1; font-weight: 800; text-align: center; padding-bottom: 0.15em; width: 100%; line-height: 1; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
    </style>
</head>
<body class="bg-slate-50 select-none overflow-x-hidden text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // --- 1. IndexedDB 手機本地快取 (版本 83) ---
        const DB_NAME = "KanaMaster_Hybrid_v83";
        const STORE_NAME = "local_audio";
        const initDB = () => new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME); };
            request.onsuccess = (e) => resolve(e.target.result);
        });
        const getLocal = async (key) => {
            const db = await initDB();
            return new Promise((r) => { const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(key); req.onsuccess = () => r(req.result); req.onerror = () => r(null); });
        };
        const saveLocal = async (key, val) => {
            const db = await initDB();
            db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).put(val, key);
        };

        // --- 2. 音訊工具 ---
        const pcmToWav = (base64) => {
            try {
                const bytes = atob(base64);
                const buffer = new ArrayBuffer(bytes.length + 44);
                const view = new DataView(buffer);
                const writeString = (off, str) => { for(let i=0; i<str.length; i++) view.setUint8(off+i, str.charCodeAt(i)); };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + bytes.length, true);
                writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, 24000, true);
                view.setUint32(28, 48000, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeString(36, 'data'); view.setUint32(40, bytes.length, true);
                for(let i=0; i<bytes.length; i++) view.setUint8(44+i, bytes.charCodeAt(i));
                return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
            } catch(e) { return null; }
        };

        const RubyText = ({ text, className = "" }) => {
            if (!text) return null;
            const parts = text.split(/([^[\]\s、。！？]+\[[^\]]+\])/g);
            return <span className={className}>{parts.map((p, i) => {
                const m = p.match(/^([^\[]+)\[([^\]]+)\]$/);
                return m ? <ruby key={i}>{m[1]}<rt>{m[2]}</rt></ruby> : <span key={i}>{p}</span>;
            })}</span>;
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, className]);
            return <span key={name} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}><i data-lucide={name} style={{ width: size, height: size }}></i></span>;
        };

        function App() {
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [ttsStatus, setTtsStatus] = useState('Standby');
            
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('k_gas_v83') || '');
            const [useNeural, setUseNeural] = useState(() => JSON.parse(localStorage.getItem('k_use_n_v83') ?? 'true'));
            const [selectedUnits, setSelectedUnits] = useState(() => JSON.parse(localStorage.getItem('k_u_v83') || '[]'));
            const [practiceMode, setPracticeMode] = useState(() => localStorage.getItem('k_mode_v83') || 'order');
            const [autoSpeak, setAutoSpeak] = useState(() => JSON.parse(localStorage.getItem('k_autospeak_v83') ?? 'false'));
            const [speechRate, setSpeechRate] = useState(() => JSON.parse(localStorage.getItem('k_speechrate_v83') ?? "1.0"));
            const [cloudCourses, setCloudCourses] = useState(() => JSON.parse(localStorage.getItem('k_c_v83') || '{}'));
            const [activeCourseId, setActiveCourseId] = useState(() => localStorage.getItem('k_a_v83') || 'builtin');
            
            const audioCache = useRef({}); 
            const fetchingRef = useRef(new Set());

            const fetchVoice = async (primary, secondary) => {
                if (!gasUrl || !useNeural || !primary) return null;
                // 核心修復：確保即使 secondary 是空的，傳遞給 GAS 的 text 也是乾淨的
                const text = (secondary && secondary.toString().trim() !== "") ? `${primary}。 ${secondary}` : primary;
                
                if (audioCache.current[text]) return audioCache.current[text];
                if (fetchingRef.current.has(text)) return null;

                try {
                    fetchingRef.current.add(text);
                    const localBase64 = await getLocal(text);
                    if (localBase64) {
                        setTtsStatus('Hit: Local Disk');
                        const url = pcmToWav(localBase64);
                        const audio = new Audio(url);
                        audioCache.current[text] = audio;
                        return audio;
                    }

                    setTtsStatus('Fetching: Cloud...');
                    const response = await fetch(`${gasUrl}${gasUrl.includes('?') ? '&' : '?'}action=tts&text=${encodeURIComponent(text)}`);
                    const result = await response.json();
                    
                    if (result.data) {
                        setTtsStatus(result.source === 'cloud_cache' ? 'Hit: Cloud Drive' : 'Hit: Gemini API');
                        await saveLocal(text, result.data); 
                        const audio = new Audio(pcmToWav(result.data));
                        audioCache.current[text] = audio;
                        return audio;
                    }
                    throw new Error(result.error || 'No Data');
                } catch (err) {
                    setTtsStatus(`Err: ${err.message.substring(0, 20)}`);
                    return null;
                } finally {
                    fetchingRef.current.delete(text);
                }
            };

            const speak = useCallback(async (card) => {
                if (!card?.reading) return;
                if (useNeural && gasUrl) {
                    const audio = await fetchVoice(card.reading, card.secondaryreading);
                    if (audio) {
                        audio.currentTime = 0;
                        audio.playbackRate = parseFloat(speechRate);
                        audio.play().catch(() => setTtsStatus('Blocked'));
                        return;
                    }
                }
                setTtsStatus('System Fallback');
                window.speechSynthesis.cancel();
                const main = new SpeechSynthesisUtterance(card.reading);
                main.lang = 'ja-JP'; main.rate = parseFloat(speechRate);
                if (card.secondaryreading) main.onend = () => { 
                    const sec = new SpeechSynthesisUtterance(card.secondaryreading);
                    sec.lang = 'ja-JP'; sec.rate = parseFloat(speechRate);
                    setTimeout(() => window.speechSynthesis.speak(sec), 400); 
                };
                window.speechSynthesis.speak(main);
            }, [gasUrl, useNeural, speechRate]);

            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                const pool = currentLessonItems.filter(i => selectedUnits.includes(i.unit));
                if (pool.length === 0) { setCards([]); return; }
                const practiceCards = (targetMode === 'random') ? [...pool].sort(() => Math.random() - 0.5) : pool;
                setCards(practiceCards);
                setCurrentIndex(0); setIsFlipped(false); setView('practice'); 
            }, [selectedUnits, practiceMode, cloudCourses, activeCourseId]);

            // 預載策略
            useEffect(() => {
                if (!useNeural || !gasUrl || cards.length === 0) return;
                const timer = setTimeout(() => {
                    const next = cards[(currentIndex + 1) % cards.length];
                    if (next) fetchVoice(next.reading, next.secondaryreading);
                }, 3000);
                return () => clearTimeout(timer);
            }, [currentIndex, cards, gasUrl, useNeural]);

            const currentLessonItems = useMemo(() => {
                const raw = (activeCourseId === 'builtin' || !cloudCourses[activeCourseId]) ? [{ unit: "あ行", category: "kana", primary: "あ[あ]", reading: "あ", meaning: "平假名 a", secondary: "空[あ]き", secondaryreading: "あki", emoji: "🈳" }] : cloudCourses[activeCourseId];
                return raw.map(i => {
                    const n = { ...i };
                    Object.keys(i).forEach(k => n[k.toLowerCase().trim()] = i[k]);
                    return n;
                });
            }, [activeCourseId, cloudCourses]);

            const availableUnits = useMemo(() => [...new Set(currentLessonItems.map(i => i.unit))].filter(Boolean), [currentLessonItems]);
            const currentCard = useMemo(() => cards[currentIndex] || {}, [cards, currentIndex]);

            useEffect(() => {
                localStorage.setItem('k_gas_v83', gasUrl);
                localStorage.setItem('k_use_n_v83', JSON.stringify(useNeural));
                localStorage.setItem('k_u_v83', JSON.stringify(selectedUnits));
                localStorage.setItem('k_mode_v83', practiceMode);
                localStorage.setItem('k_autospeak_v83', JSON.stringify(autoSpeak));
                localStorage.setItem('k_speechrate_v83', JSON.stringify(speechRate));
                localStorage.setItem('k_c_v83', JSON.stringify(cloudCourses));
                localStorage.setItem('k_a_v83', activeCourseId);
            }, [gasUrl, useNeural, selectedUnits, practiceMode, autoSpeak, speechRate, cloudCourses, activeCourseId]);

            useEffect(() => { if (availableUnits.length > 0 && selectedUnits.length === 0) setSelectedUnits([availableUnits[0]]); }, [availableUnits]);
            useEffect(() => { if (view === 'practice' && cards.length === 0) generatePracticeSet(); }, [view]);

            // 自動跟讀
            useEffect(() => {
                if (autoSpeak && cards.length > 0 && view === 'practice' && !isFlipped && currentCard.reading) {
                    const timer = setTimeout(() => speak(currentCard), 900);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, view, autoSpeak, isFlipped, currentCard.reading, speak]);

            const syncFromCloud = async () => {
                if (!gasUrl) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(`${gasUrl}${gasUrl.includes('?') ? '&' : '?'}action=sync`);
                    const data = await res.json();
                    setCloudCourses(data);
                    const ks = Object.keys(data);
                    if (ks.length > 0) setActiveCourseId(ks[0]);
                } finally { setIsSyncing(false); }
            };

            const themePrimary = practiceMode === 'random' ? 'amber' : 'indigo';

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col transition-all duration-500">
                    <header className="bg-white/90 backdrop-blur-md border-b px-4 py-3 sticky top-0 z-30 flex justify-between items-center shadow-sm h-14">
                        <div className="flex flex-col">
                            <h1 className={`text-lg font-bold text-${themePrimary}-600 leading-none tracking-tight`}>Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-black uppercase truncate max-w-[120px] mt-1">{activeCourseId}</span>
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="flex bg-slate-100 p-1 rounded-xl gap-0.5 mr-1 shadow-inner">
                                <button onClick={() => { setPracticeMode('order'); if(view==='settings') generatePracticeSet('order'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'order' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}><Icon name="list-ordered" size={18} /></button>
                                <button onClick={() => { setPracticeMode('random'); if(view==='settings') generatePracticeSet('random'); }} className={`p-1.5 rounded-lg transition-all ${practiceMode === 'random' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-400'}`}><Icon name="shuffle" size={18} /></button>
                            </div>
                            {/* 修復圖示邏輯：autoSpeak 為 true 顯示 volume-2 */}
                            <button onClick={() => setAutoSpeak(!autoSpeak)} className={`p-2 rounded-xl active:scale-90 ${autoSpeak ? `bg-${themePrimary}-600 text-white shadow-md` : 'bg-slate-100 text-slate-400'}`}><Icon name={autoSpeak ? "volume-2" : "volume-x"} size={20} /></button>
                            <button onClick={() => { if(view === 'settings') generatePracticeSet(); else setView('settings'); }} className={`p-2 rounded-xl transition-colors ${view === 'settings' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 flex-1 w-full overflow-y-auto no-scrollbar pb-32">
                        {view === 'practice' && (
                            <div className="space-y-4 h-full flex flex-col animate-in fade-in duration-500">
                                {cards.length > 0 ? (
                                    <>
                                        <div className="shrink-0">
                                            <div className="flex justify-between items-end mb-1 px-1 text-[10px] font-black text-slate-400 uppercase"><span>{currentCard.unit}</span><span>{currentIndex + 1} / {cards.length}</span></div>
                                            <div className="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden shadow-inner"><div className={`bg-${themePrimary}-500 h-full transition-all duration-300`} style={{ width: `${((currentIndex + 1) / cards.length) * 100}%` }}></div></div>
                                        </div>
                                        <div className={`relative h-[460px] w-full perspective-1000 cursor-pointer transform-style-3d transition-transform duration-500 ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden border border-slate-100 ${isFlipped ? 'hidden' : 'flex'}`}>
                                                <div className="h-1/4 flex items-center justify-center bg-indigo-50/30 relative">
                                                    <span className="text-8xl animate-bounce-slow">{currentCard.emoji}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className={`absolute top-4 right-4 bg-${themePrimary}-600 text-white p-3 rounded-full shadow-lg active:scale-90`}><Icon name="volume-2" size={20}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                                                    <RubyText text={currentCard.primary} className={`${(currentCard.primary || '').length > 6 ? 'text-5xl' : 'text-8xl'} font-black text-slate-800`} />
                                                    {currentCard.secondary && <div className="mt-8 bg-slate-50 px-6 py-4 rounded-3xl border border-slate-100"><RubyText text={currentCard.secondary} className="text-indigo-400 font-bold text-3xl italic" /></div>}
                                                </div>
                                            </div>
                                            <div className={`absolute inset-0 bg-white rounded-[2.5rem] card-shadow flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-indigo-100 ${isFlipped ? 'flex' : 'hidden'}`}>
                                                <div className="h-20 flex items-center justify-between px-8 bg-slate-50 border-b shrink-0">
                                                    <div className="flex items-center gap-3"><span className="text-3xl">{currentCard.emoji}</span><RubyText text={currentCard.primary} className="text-xl font-black text-slate-400" /></div>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="text-indigo-600 p-2 active:scale-90"><Icon name="volume-2" size={24}/></button>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-6 overflow-y-auto no-scrollbar">
                                                    <div className="space-y-1"><h3 className="text-4xl font-black text-indigo-600 tracking-tight">{currentCard.meaning}</h3><p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">翻譯</p></div>
                                                    {currentCard.secondary && <div className="bg-indigo-50/50 p-5 rounded-3xl w-full"><RubyText text={currentCard.secondary} className="text-slate-600 font-bold text-4xl" /></div>}
                                                    <div className="w-full text-left space-y-2">
                                                        {currentCard.notes && <div className="bg-slate-50 p-4 rounded-2xl border text-sm text-slate-500 leading-relaxed">{currentCard.notes}</div>}
                                                        <div className="bg-rose-50 p-2 rounded-xl border border-rose-100 opacity-60">
                                                            <div className="flex justify-between items-center mb-1 text-[8px] font-black uppercase"><p className="text-rose-400">Hybrid Monitor</p><span className="bg-emerald-500 text-white px-1 rounded">{ttsStatus}</span></div>
                                                            <p className="text-[9px] font-mono text-rose-600 truncate">{currentCard.reading} {currentCard.secondaryreading}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-2">
                                            <button onClick={() => { if(currentIndex>0) { setIsFlipped(false); setTimeout(()=>setCurrentIndex(p=>p-1),150); } }} disabled={currentIndex === 0} className="bg-white border-2 border-slate-200 py-4 rounded-3xl font-black text-xs text-slate-500 disabled:opacity-30 active:scale-95 transition-all">上一張</button>
                                            <button onClick={() => { if(currentIndex < cards.length-1) { setIsFlipped(false); setTimeout(()=>setCurrentIndex(p=>p+1),150); } else generatePracticeSet(); }} className={`bg-${themePrimary}-600 text-white py-4 rounded-3xl font-black shadow-xl active:scale-95 transition-all`}>下一張</button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-10 space-y-4"><Icon name="cloud-off" size={64} className="text-slate-200" /><p className="text-slate-400 font-bold text-lg">請至設定同步課程</p></div>
                                )}
                            </div>
                        )}
                        {view === 'settings' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <section className="bg-white p-5 rounded-[2rem] border shadow-lg space-y-4">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700">語音快取診斷</h2>
                                    <button onClick={() => speak(currentCard)} className="w-full py-4 rounded-xl bg-indigo-500 text-white font-bold shadow-md active:scale-95">測試高品質發音</button>
                                    <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 space-y-1">
                                        <p className="text-[10px] font-black text-slate-400">目前狀態</p>
                                        <p className="text-xs font-mono font-bold text-emerald-500">{ttsStatus}</p>
                                    </div>
                                    <label className="flex items-center justify-between p-1 cursor-pointer">
                                        <div className="flex flex-col"><span className="text-sm font-bold">啟用雙層快取發音</span><span className="text-[9px] text-indigo-400 uppercase font-black tracking-tighter">自動備份雲端與手機</span></div>
                                        <input type="checkbox" checked={useNeural} onChange={(e) => setUseNeural(e.target.checked)} className="w-6 h-6 rounded-md accent-indigo-600" />
                                    </label>
                                    <div className="space-y-2">
                                        <h3 className="text-xs font-black text-slate-400 uppercase ml-1">發音速度: {speechRate}x</h3>
                                        <input type="range" min="0.5" max="1.5" step="0.1" value={speechRate} onChange={(e) => setSpeechRate(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                    </div>
                                </section>
                                <section className="bg-white p-5 rounded-[2rem] border shadow-lg space-y-4">
                                    <h2 className="text-base font-black text-slate-700">教材與連結</h2>
                                    <input type="text" placeholder="貼上 GAS URL" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500" />
                                    <button onClick={syncFromCloud} disabled={isSyncing || !gasUrl} className={`w-full py-4 rounded-xl bg-indigo-600 text-white font-bold shadow-md active:scale-95`}>同步教材分頁</button>
                                    <select value={activeCourseId} onChange={(e) => { setActiveCourseId(e.target.value); setSelectedUnits([]); }} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none">
                                        <option value="builtin">預設課程 (基礎五十音)</option>
                                        {Object.keys(cloudCourses).map(n => <option key={n} value={n}>{n}</option>)}
                                    </select>
                                </section>
                                <section className="bg-white p-5 rounded-[2rem] border shadow-lg space-y-4 pb-24">
                                    <h2 className="text-base font-black text-slate-700 uppercase">單元選擇</h2>
                                    <div className="grid grid-cols-2 gap-2">
                                        {availableUnits.map(u => (
                                            <button key={u} onClick={() => setSelectedUnits(prev => prev.includes(u) ? prev.filter(x => x !== u) : [...prev, u])} className={`py-3 px-2 rounded-xl text-[10px] font-black border transition-all ${selectedUnits.includes(u) ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border-slate-100'}`}>{u}</button>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 z-40"><button onClick={() => generatePracticeSet()} className="bg-slate-900 text-white px-10 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 active:scale-95 transition-all animate-in slide-in-from-bottom-6"><Icon name="check-circle" size={18} /><span className="text-sm font-black uppercase tracking-widest">套用設定並開始</span></button></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
