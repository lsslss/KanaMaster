            { kana: 'ン', romaji: 'n', row: '鼻音', charType: 'kata', word: 'パン', meaning: '麵包', emoji: '🍞', source: '尓' },

            // --- 片假名濁音 ---
            { kana: 'ガ', romaji: 'ga', row: 'ガ行', charType: 'kata', word: 'ガイド', meaning: '導遊', emoji: '🚩', source: '加' },
            { kana: 'ギ', romaji: 'gi', row: 'ガ行', charType: 'kata', word: 'ギフト', meaning: '禮物', emoji: '🎁', source: '幾' },
            { kana: 'グ', romaji: 'gu', row: 'ガ行', charType: 'kata', word: 'グルメ', meaning: '美食', emoji: '🍽️', source: '久' },
            { kana: 'ゲ', romaji: 'ge', row: 'ガ行', charType: 'kata', word: 'ゲーム', meaning: '遊戲', emoji: '🎮', source: '介' },
            { kana: 'ゴ', romaji: 'go', row: 'ガ行', charType: 'kata', word: 'ゴルフ', meaning: '高爾夫', emoji: '⛳', source: '己' },
            { kana: 'パ', romaji: 'pa', row: 'パ行', charType: 'kata', word: 'パスポート', meaning: '護照', emoji: '🛂', source: '八' },
            { kana: 'ピ', romaji: 'pi', row: 'パ行', charType: 'kata', word: 'ピンク', meaning: '粉紅色', emoji: '💗', source: '比' },

            // --- 片假名拗音 ---
            { kana: 'キャ', romaji: 'kya', row: 'キャ行', charType: 'kata', word: 'キャンセル', meaning: '取消', emoji: '❌', source: '幾+也' },
            { kana: 'シャ', romaji: 'sha', row: 'シャ行', charType: 'kata', word: 'シャツ', meaning: '襯衫', emoji: '👕', source: '之+也' },
            { kana: 'チョコ', romaji: 'choco', row: 'チャ行', charType: 'kata', word: 'チョコ', meaning: '巧克力', emoji: '🍫', source: '知+與' }
        ];

        // --- 完整行分類設定 ---
        const ROW_GROUPS_DETAILED = {
            'hira': {
                '基本音': ['あ行', 'か行', 'さ行', 'た行', 'な行', 'は行', 'ま行', 'や行', 'ら行', 'わ行', '鼻音'],
                '濁音/半濁音': ['が行', 'ざ行', 'だ行', 'ば行', 'ぱ行'],
                '拗音': ['きゃ行', 'しゃ行', 'ちゃ行']
            },
            'kata': {
                '基本音': ['ア行', 'カ行', 'サ行', 'タ行', '納行', 'ハ行', 'マ行', 'ヤ行', 'ラ行', 'ワ行', '鼻音'],
                '濁音/半濁音': ['ガ行', 'ザ行', 'ダ行', 'バ行', 'パ行'],
                '拗音': ['キャ行', 'シャ行', 'チャ行']
            }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('practice');
            const [cards, setCards] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            // --- 持久化狀態管理 ---
            const [selectedTypes, setSelectedTypes] = useState(() => {
                const saved = localStorage.getItem('kana_selected_types_v3');
                return saved ? JSON.parse(saved) : ['hira'];
            });

            const [selectedRows, setSelectedRows] = useState(() => {
                const saved = localStorage.getItem('kana_selected_rows_full_v3');
                return saved ? JSON.parse(saved) : ['あ行'];
            });

            const [practiceMode, setPracticeMode] = useState(() => {
                const saved = localStorage.getItem('kana_practice_mode_v3');
                return saved || 'order';
            });

            const [showSource, setShowSource] = useState(() => {
                const saved = localStorage.getItem('kana_show_source_v3');
                return saved !== null ? JSON.parse(saved) : true;
            });

            const [weakList, setWeakList] = useState(() => {
                const saved = localStorage.getItem('kana_weak_list_full_v3');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => localStorage.setItem('kana_selected_types_v3', JSON.stringify(selectedTypes)), [selectedTypes]);
            useEffect(() => localStorage.setItem('kana_selected_rows_full_v3', JSON.stringify(selectedRows)), [selectedRows]);
            useEffect(() => localStorage.setItem('kana_show_source_v3', JSON.stringify(showSource)), [showSource]);
            useEffect(() => localStorage.setItem('kana_weak_list_full_v3', JSON.stringify(weakList)), [weakList]);
            useEffect(() => localStorage.setItem('kana_practice_mode_v3', practiceMode), [practiceMode]);

            // --- 生成題目邏輯 ---
            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                let pool = [];
                if (targetMode === 'weak') {
                    pool = KANA_DATA.filter(i => weakList.includes(i.kana));
                } else {
                    pool = KANA_DATA.filter(i => selectedTypes.includes(i.charType) && selectedRows.includes(i.row));
                    if (targetMode === 'shuffle') {
                        pool = [...pool].sort(() => Math.random() - 0.5);
                    }
                }
                setCards(pool.length > 0 ? pool : [KANA_DATA[0]]);
                setCurrentIndex(0);
                setIsFlipped(false);
                setView('practice');
            }, [selectedTypes, selectedRows, practiceMode, weakList]);

            useEffect(() => { generatePracticeSet(); }, []);

            const speak = (card) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(`${card.kana}。 ${card.word}`);
                utterance.lang = 'ja-JP'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            };

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    if (currentIndex === cards.length - 1) {
                        if (practiceMode === 'shuffle') generatePracticeSet('shuffle');
                        else setCurrentIndex(0);
                    } else {
                        setCurrentIndex(prev => prev + 1);
                    }
                }, 50);
            };

            const togglePracticeMode = () => {
                const nextMode = practiceMode === 'order' ? 'shuffle' : 'order';
                setPracticeMode(nextMode);
                generatePracticeSet(nextMode);
            };

            const toggleWeak = (kana) => setWeakList(p => p.includes(kana) ? p.filter(k => k !== kana) : [...p, kana]);
            const currentCard = cards[currentIndex] || {};
            const isWeak = weakList.includes(currentCard.kana);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10 flex flex-col">
                    <header className="bg-white border-b px-4 py-2 sticky top-0 z-20 flex justify-between items-center shadow-sm h-14 shrink-0">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-bold text-indigo-600 leading-none">Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-black tracking-widest uppercase mt-0.5">Travel All-Access</span>
                        </div>
                        <div className="flex gap-1">
                            {weakList.length > 0 && view !== 'settings' && (
                                <button onClick={() => generatePracticeSet('weak')} className="p-2 text-amber-500 transition-transform active:scale-90">
                                    <div className="relative"><Icon name="zap" size={20} /><span className="absolute -top-1 -right-1 bg-amber-500 text-white text-[8px] w-3 h-3 rounded-full flex items-center justify-center font-bold">{weakList.length}</span></div>
                                </button>
                            )}
                            <button onClick={() => setView('settings')} className="p-2 text-slate-400 hover:bg-slate-100 rounded-xl"><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 flex-1 w-full overflow-y-auto no-scrollbar">
                        {view === 'practice' && (
                            <div className="space-y-4 animate-in fade-in duration-500 h-full flex flex-col">
                                <div className="shrink-0">
                                    <div className="flex justify-between items-end mb-1 px-1">
                                        <div className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Progress</div>
                                        <div className="text-[10px] font-black text-slate-400">{currentIndex + 1} / {cards.length}</div>
                                    </div>
                                    <div className="w-full bg-slate-200 h-1 rounded-full overflow-hidden">
                                        <div className="bg-indigo-500 h-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / cards.length) * 100}%` }}></div>
                                    </div>
                                </div>

                                <div className={`relative h-[480px] w-full perspective-1000 cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`absolute inset-0 bg-white rounded-[2rem] shadow-lg flex flex-col overflow-hidden backface-hidden border border-slate-100 ${isFlipped ? 'hidden' : 'flex'}`}>
                                        <div className="h-1/3 flex items-center justify-center bg-indigo-50/30 relative">
                                            <span className="text-8xl animate-bounce-slow drop-shadow-sm">{currentCard.emoji}</span>
                                            {showSource && <div className="absolute top-3 right-4 bg-white/90 backdrop-blur px-2.5 py-0.5 rounded-full shadow-sm border border-indigo-100 flex items-center gap-1"><span className="text-[10px] font-bold text-indigo-400">源自</span><span className="text-lg font-black text-indigo-600">{currentCard.source}</span></div>}
                                            {isWeak && <div className="absolute top-3 left-4 text-amber-500 animate-pulse"><Icon name="zap" size={20} /></div>}
                                            <div className="absolute bottom-2 left-4 bg-slate-800 text-white text-[8px] font-black px-2 py-0.5 rounded-md uppercase tracking-widest opacity-50">{currentCard.charType === 'hira' ? 'Hiragana' : 'Katakana'}</div>
                                        </div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4">
                                            <span className={`${currentCard.kana?.length > 1 ? 'text-7xl' : 'text-8xl'} font-black text-slate-800 leading-none`}>{currentCard.kana}</span>
                                            <div className="mt-4 text-center"><p className="text-indigo-600 font-bold text-xl tracking-tight">{currentCard.word}</p><p className="text-slate-400 text-[11px] font-medium">{currentCard.meaning}</p></div>
                                        </div>
                                        <div className="h-12 flex items-center justify-center text-slate-300 text-[9px] font-bold uppercase tracking-[0.2em] border-t border-slate-50">點擊看讀音</div>
                                    </div>
                                    <div className={`absolute inset-0 bg-white rounded-[2rem] shadow-lg flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-indigo-100 transition-opacity ${isFlipped ? 'flex' : 'hidden'}`}>
                                        <div className="h-1/4 flex items-center justify-center bg-slate-50/50 relative"><span className="text-7xl opacity-30 grayscale">{currentCard.emoji}</span><button onClick={(e) => { e.stopPropagation(); toggleWeak(currentCard.kana); }} className={`absolute top-4 right-4 p-3 rounded-2xl border transition-all ${isWeak ? 'bg-amber-500 border-amber-500 text-white shadow-amber-100' : 'bg-white border-slate-200 text-slate-400'}`}><Icon name="zap" size={20} /></button></div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                                            <div className="mb-4"><div className="flex items-baseline justify-center gap-3"><span className="text-7xl font-black text-indigo-600 uppercase tracking-tighter drop-shadow-sm">{currentCard.romaji}</span><span className="text-3xl font-bold text-slate-300">({currentCard.kana})</span></div></div>
                                            <div className="flex flex-col items-center gap-2 mb-4"><div className="px-5 py-1.5 bg-indigo-600 rounded-xl shadow-md"><span className="text-white font-black text-xl">{currentCard.word}</span></div><span className="text-slate-500 font-black text-sm uppercase tracking-tight">[{currentCard.meaning}]</span></div>
                                            <div className="flex items-center gap-6 mt-2"><div className="flex items-center gap-1.5 bg-slate-100 px-3 py-1 rounded-lg"><span className="text-[10px] font-bold text-slate-400 uppercase">Origin</span><span className="text-lg font-black text-slate-600">{currentCard.source}</span></div><button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="bg-indigo-600 text-white p-4 rounded-full shadow-lg shadow-indigo-100 active:scale-90 transition-transform"><Icon name="volume-2" size={28} /></button></div>
                                        </div>
                                        <div className="h-12 flex items-center justify-center text-indigo-200 text-[9px] font-bold uppercase tracking-[0.2em] border-t border-indigo-50">點擊回到正面</div>
                                    </div>
                                </div>

                                <div className="flex gap-3 px-1 mt-auto pb-4 shrink-0">
                                    <button onClick={handleNext} className="flex-[3] bg-white border border-slate-200 py-4 rounded-2xl font-black text-slate-600 active:bg-slate-100 transition-all shadow-sm text-sm">NEXT KANA</button>
                                    <button onClick={togglePracticeMode} className={`flex-[2] py-4 rounded-2xl font-black text-white shadow-md active:scale-95 transition-all flex flex-col items-center justify-center gap-0.5 ${practiceMode === 'order' ? 'bg-slate-900' : 'bg-indigo-600'}`}><div className="flex items-center gap-1.5"><Icon name={practiceMode === 'order' ? "list-ordered" : "shuffle"} size={16} /><span className="text-[10px] uppercase tracking-tighter">{practiceMode === 'order' ? 'Order' : 'Shuffle'}</span></div><span className="text-[9px] opacity-60 font-medium">SWITCH MODE</span></button>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 pb-24">
                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>記憶偏好</h2>
                                    <label className="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm cursor-pointer"><div className="flex flex-col"><span className="font-black text-slate-700 text-sm">顯示起源漢字</span><span className="text-[9px] text-slate-400 font-bold uppercase tracking-tight">Show Etymology</span></div><input type="checkbox" checked={showSource} onChange={(e) => setShowSource(e.target.checked)} className="w-5 h-5 rounded-md accent-indigo-600 cursor-pointer" /></label>
                                </section>

                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>文字種類</h2>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[ {id: 'hira', label: '平假名', icon: 'あ'}, {id: 'kata', label: '片假名', icon: 'ア'} ].map(t => (
                                            <button key={t.id} onClick={() => setSelectedTypes(prev => prev.includes(t.id) ? prev.filter(x => x !== t.id) : [...prev, t.id])} className={`py-4 rounded-2xl border flex flex-col items-center gap-1 transition-all ${selectedTypes.includes(t.id) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}><span className="text-xl font-black">{t.icon}</span><span className="text-xs font-black">{t.label}</span></button>
                                        ))}
                                    </div>
                                </section>

                                <section className="space-y-3">
                                    <h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>練習範圍 (行)</h2>
                                    <div className="space-y-8">
                                        {selectedTypes.map(type => (
                                            <div key={type} className="space-y-4">
                                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest px-1 flex items-center gap-2 border-b border-indigo-50 pb-2">{type === 'hira' ? '平假名類別' : '片假名類別'}</p>
                                                {Object.entries(ROW_GROUPS_DETAILED[type]).map(([subLabel, rows]) => (
                                                    <div key={subLabel} className="space-y-2">
                                                        <span className="text-[10px] font-bold text-slate-400 ml-1">{subLabel}</span>
                                                        <div className="grid grid-cols-4 gap-2">
                                                            {rows.map(row => (
                                                                <button key={row} onClick={() => setSelectedRows(prev => prev.includes(row) ? prev.filter(r => r !== row) : [...prev, row])} className={`py-2.5 rounded-xl text-[10px] font-black transition-all border ${selectedRows.includes(row) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-400 hover:border-indigo-200'}`}>{row.replace('行', '')}</button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                        {selectedTypes.length === 0 && <p className="text-xs text-slate-400 italic text-center py-4">請先勾選上方的文字種類</p>}
                                    </div>
                                </section>
                                
                                <button onClick={() => generatePracticeSet()} disabled={selectedTypes.length === 0 || selectedRows.length === 0} className="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-30 disabled:grayscale"><Icon name="play" size={20} /> 更新並開始</button>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 z-30">
                            <button onClick={() => setView('practice')} className="bg-white/95 backdrop-blur text-indigo-600 px-10 py-4 rounded-full font-black shadow-2xl border border-indigo-50 flex items-center gap-3 active:scale-95 transition-transform"><Icon name="arrow-left" size={18} /> 返回練習頁</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
