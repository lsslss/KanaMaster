            const [selectedRows, setSelectedRows] = useState(() => JSON.parse(localStorage.getItem('k_rows_pwa_v15') || '["あ行"]'));
            const [practiceMode, setPracticeMode] = useState(() => localStorage.getItem('k_mode_pwa_v15') || 'order');
            const [showSource, setShowSource] = useState(() => JSON.parse(localStorage.getItem('k_source_pwa_v15') ?? 'true'));
            const [autoSpeak, setAutoSpeak] = useState(() => JSON.parse(localStorage.getItem('k_autospeak_pwa_v15') ?? 'false'));
            const [srsData, setSrsData] = useState(() => JSON.parse(localStorage.getItem('k_srs_pwa_v15') || '{}'));

            // 修正變數提前宣告位置
            const currentCard = cards[currentIndex] || {};
            const isWeak = currentCard.kana ? (srsData[currentCard.kana]?.step || 0) < 2 : false;

            useEffect(() => {
                localStorage.setItem('k_types_pwa_v15', JSON.stringify(selectedTypes));
                localStorage.setItem('k_rows_pwa_v15', JSON.stringify(selectedRows));
                localStorage.setItem('k_source_pwa_v15', JSON.stringify(showSource));
                localStorage.setItem('k_autospeak_pwa_v15', JSON.stringify(autoSpeak));
                localStorage.setItem('k_srs_pwa_v15', JSON.stringify(srsData));
                localStorage.setItem('k_mode_pwa_v15', practiceMode);
            }, [selectedTypes, selectedRows, showSource, autoSpeak, srsData, practiceMode]);

            const dueCount = useMemo(() => {
                const now = Date.now();
                return KANA_DATA.filter(item => {
                    if (!selectedTypes.includes(item.charType) || !selectedRows.includes(item.row)) return false;
                    const rec = srsData[item.kana];
                    return rec && rec.nextReview <= now;
                }).length;
            }, [srsData, selectedTypes, selectedRows]);

            const generatePracticeSet = useCallback((targetMode = practiceMode) => {
                const pool = KANA_DATA.filter(i => selectedTypes.includes(i.charType) && selectedRows.includes(i.row));
                let practiceCards = [];
                if (targetMode === 'anki') {
                    const now = Date.now();
                    practiceCards = pool.filter(i => {
                        const rec = srsData[i.kana];
                        return !rec || rec.nextReview <= now;
                    }).sort(() => Math.random() - 0.5);
                } else {
                    practiceCards = pool;
                }
                setCards(practiceCards.length > 0 ? practiceCards : [KANA_DATA[0]]);
                setCurrentIndex(0); setIsFlipped(false); setView('practice');
            }, [selectedTypes, selectedRows, srsData, practiceMode]);

            useEffect(() => { generatePracticeSet(); }, []);

            const speak = useCallback((card) => {
                if (!window.speechSynthesis || !card || !card.kana) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(`${card.kana}。 ${card.word}`);
                utterance.lang = 'ja-JP'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }, []);

            useEffect(() => {
                if (autoSpeak && cards.length > 0 && view === 'practice' && !isFlipped) {
                    const timer = setTimeout(() => speak(cards[currentIndex]), 500);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, cards, view, autoSpeak, isFlipped, speak]);

            const handleReview = (kana, quality) => {
                setSrsData(prev => {
                    const now = Date.now();
                    const record = prev[kana] || { interval: 0, ease: 2.5, step: 0 };
                    let { interval, ease, step } = record;
                    if (quality === 1) { interval = 0; step = 0; ease = Math.max(1.3, ease - 0.2); }
                    else if (quality === 2) { interval = interval === 0 ? 0.5 : interval * 1.2; ease = Math.max(1.3, ease - 0.15); }
                    else if (quality === 3) { interval = interval === 0 ? 1 : interval * ease; step++; }
                    else { interval = interval === 0 ? 4 : interval * ease * 1.3; ease += 0.15; }
                    const nextReview = now + (interval * 24 * 60 * 60 * 1000);
                    return { ...prev, [kana]: { interval, ease, step, nextReview } };
                });
                setIsFlipped(false);
                setTimeout(() => {
                    if (currentIndex === cards.length - 1) generatePracticeSet();
                    else setCurrentIndex(prev => prev + 1);
                }, 100);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10 flex flex-col">
                    <header className="bg-white border-b px-4 py-2 sticky top-0 z-30 flex justify-between items-center shadow-sm h-14 shrink-0">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-bold text-indigo-600 leading-none">Kana Master</h1>
                            <span className="text-[9px] text-slate-400 font-black tracking-widest uppercase mt-0.5">
                                {practiceMode === 'anki' ? `SRS: ${dueCount} Due` : 'Learning Mode'}
                            </span>
                        </div>
                        
                        <div className="flex items-center gap-1">
                            <button onClick={() => { const nm = practiceMode === 'order' ? 'anki' : 'order'; setPracticeMode(nm); generatePracticeSet(nm); }} className={`p-2 rounded-xl active:scale-90 transition-all ${practiceMode === 'anki' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-900 text-white'}`}><Icon name={practiceMode === 'anki' ? "brain" : "list-ordered"} size={20} /></button>
                            <button onClick={() => setAutoSpeak(!autoSpeak)} className={`p-2 rounded-xl transition-all active:scale-90 ${autoSpeak ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}><Icon name={autoSpeak ? "volume-2" : "volume-x"} size={20} /></button>
                            <button onClick={() => setView('settings')} className={`p-2 rounded-xl transition-colors ${view === 'settings' ? 'bg-indigo-100 text-indigo-600' : 'text-slate-400'}`}><Icon name="settings" size={20} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 flex-1 w-full overflow-y-auto no-scrollbar">
                        {view === 'practice' && (
                            <div className="space-y-4 animate-in fade-in duration-500 h-full flex flex-col">
                                <div className="shrink-0">
                                    <div className="flex justify-between items-end mb-1 px-1"><div className="text-[10px] font-black text-indigo-400 uppercase tracking-widest text-center">Progress</div><div className="text-[10px] font-black text-slate-400">{currentIndex + 1} / {cards.length}</div></div>
                                    <div className="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden shadow-inner"><div className="bg-indigo-500 h-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / cards.length) * 100}%` }}></div></div>
                                </div>

                                <div className={`relative h-[420px] w-full perspective-1000 cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`absolute inset-0 bg-white rounded-[2.5rem] shadow-lg flex flex-col overflow-hidden backface-hidden border border-slate-100 ${isFlipped ? 'hidden' : 'flex'}`}>
                                        <div className="h-1/3 flex items-center justify-center bg-indigo-50/30 relative">
                                            <span className="text-8xl animate-bounce-slow drop-shadow-sm">{currentCard.emoji}</span>
                                            {showSource && <div className="absolute top-3 right-4 bg-white/90 backdrop-blur px-2.5 py-0.5 rounded-full shadow-sm border border-indigo-100 flex items-center gap-1"><span className="text-[10px] font-bold text-indigo-400 tracking-tighter">源自</span><span className="text-lg font-black text-indigo-600">{currentCard.source}</span></div>}
                                            <div className="absolute bottom-2 left-4 bg-slate-800 text-white text-[8px] font-black px-2 py-0.5 rounded-md uppercase tracking-widest opacity-50">{currentCard.charType}</div>
                                        </div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4">
                                            <span className={`${currentCard.kana?.length > 1 ? 'text-7xl' : 'text-8xl'} font-black text-slate-800 leading-none`}>{currentCard.kana}</span>
                                            <div className="mt-4 text-center">
                                                <p className="text-indigo-600 font-bold text-xl tracking-tight">{currentCard.word}</p>
                                                <p className="text-slate-400 text-[11px] font-medium tracking-wide">{currentCard.meaning}</p>
                                            </div>
                                        </div>
                                        <div className="h-10 flex items-center justify-center text-slate-300 text-[8px] font-bold uppercase tracking-[0.2em] border-t border-slate-50">點擊翻轉</div>
                                    </div>
                                    <div className={`absolute inset-0 bg-white rounded-[2.5rem] shadow-lg flex flex-col overflow-hidden backface-hidden rotate-y-180 border border-indigo-100 transition-opacity ${isFlipped ? 'flex' : 'hidden'}`}>
                                        <div className="h-1/4 flex items-center justify-center bg-slate-50/50 relative"><span className="text-7xl opacity-30 grayscale">{currentCard.emoji}</span><button onClick={(e) => { e.stopPropagation(); speak(currentCard); }} className="absolute top-4 right-4 bg-indigo-600 text-white p-3 rounded-full shadow-lg active:scale-90 transition-transform"><Icon name="volume-2" size={24} /></button></div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                                            <div className="mb-4"><div className="flex items-baseline justify-center gap-3"><span className="text-7xl font-black text-indigo-600 uppercase tracking-tighter drop-shadow-sm">{currentCard.romaji}</span><span className="text-3xl font-bold text-slate-300">({currentCard.kana})</span></div></div>
                                            <div className="flex flex-col items-center gap-2 mb-4"><div className="px-5 py-1.5 bg-indigo-600 rounded-xl shadow-md"><span className="text-white font-black text-xl">{currentCard.word}</span></div><span className="text-slate-500 font-black text-sm uppercase tracking-tight">[{currentCard.meaning}]</span></div>
                                            <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100 mt-2"><span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Level</span><span className="text-base font-black text-indigo-500">{srsData[currentCard.kana]?.step || 0}</span></div>
                                        </div>
                                        <div className="h-10 flex items-center justify-center text-indigo-200 text-[8px] font-bold uppercase tracking-[0.2em] border-t border-indigo-50">點擊回到正面</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-4 gap-2 pt-2 shrink-0">
                                    {[ { q: 1, l: '重來', c: 'bg-red-50 text-red-600 border-red-100', sub: '<1m' }, { q: 2, l: '困難', c: 'bg-orange-50 text-orange-600 border-orange-100', sub: '1d' }, { q: 3, l: '良好', c: 'bg-green-50 text-green-600 border-green-100', sub: '3d' }, { q: 4, l: '簡單', c: 'bg-blue-50 text-blue-600 border-blue-100', sub: '7d' } ].map(btn => (
                                        <button key={btn.q} onClick={(e) => { e.stopPropagation(); handleReview(currentCard.kana, btn.q); }} className={`${btn.c} border-2 py-3 rounded-2xl flex flex-col items-center justify-center transition-all active:scale-95 shadow-sm`}><span className="font-black text-sm">{btn.l}</span><span className="text-[8px] font-bold opacity-60 uppercase">{btn.sub}</span></button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 pb-40">
                                <section className="space-y-3"><h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>偏好設定</h2><label className="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm cursor-pointer active:bg-slate-50"><div className="flex flex-col"><span className="font-black text-slate-700 text-sm">顯示起源漢字</span><span className="text-[9px] text-slate-400 font-bold uppercase tracking-tight">Show Etymology</span></div><input type="checkbox" checked={showSource} onChange={(e) => setShowSource(e.target.checked)} className="w-5 h-5 rounded-md accent-indigo-600" /></label></section>
                                <section className="space-y-3"><h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>練習種類</h2><div className="grid grid-cols-2 gap-2">{[ {id: 'hira', label: '平假名', icon: 'あ'}, {id: 'kata', label: '片假名', icon: 'ア'} ].map(t => (<button key={t.id} onClick={() => setSelectedTypes(prev => prev.includes(t.id) ? prev.filter(x => x !== t.id) : [...prev, t.id])} className={`py-4 rounded-2xl border flex flex-col items-center gap-1 transition-all ${selectedTypes.includes(t.id) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}><span className="text-xl font-black">{t.icon}</span><span className="text-xs font-black">{t.label}</span></button>))}</div></section>
                                <section className="space-y-3"><h2 className="text-base font-black flex items-center gap-2 text-slate-700"><div className="w-1 h-5 bg-indigo-500 rounded-full"></div>練習範圍</h2><div className="space-y-8">{selectedTypes.map(type => (<div key={type} className="space-y-6"><p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest px-1 flex items-center gap-2 border-b border-indigo-50 pb-2">{type === 'hira' ? '平假名選單' : '片假名選單'}</p>{Object.entries(ROW_GROUPS_DETAILED[type]).map(([subLabel, rows]) => (<div key={subLabel} className="space-y-2"><span className="text-[10px] font-bold text-slate-400 ml-1">{subLabel}</span><div className="grid grid-cols-4 gap-2">{rows.map(row => (<button key={row} onClick={() => setSelectedRows(prev => prev.includes(row) ? prev.filter(r => r !== row) : [...prev, row])} className={`py-2.5 rounded-xl text-[10px] font-black transition-all border ${selectedRows.includes(row) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-400'}`}>{row.replace('行', '')}</button>))}</div></div>))}</div>))}</div></section>
                            </div>
                        )}
                    </main>

                    {view !== 'practice' && (
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 z-30 pointer-events-none"><button onClick={() => { if (view === 'settings') generatePracticeSet(); else setView('practice'); }} className="pointer-events-auto bg-white/95 backdrop-blur text-indigo-600 px-10 py-4 rounded-full font-black shadow-2xl border border-indigo-50 flex items-center gap-3 active:scale-95 transition-transform"><Icon name={view === 'settings' ? "check-circle" : "arrow-left"} size={18} /> {view === 'settings' ? "套用設定並開始" : "返回練習頁"}</button></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('install', (e) => { self.skipWaiting(); }); self.addEventListener('fetch', (event) => { event.respondWith(fetch(event.request).catch(() => caches.match(event.request))); });`;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW failed', err));
        }
    </script>
</body>
</html>
